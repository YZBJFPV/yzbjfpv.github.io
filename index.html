<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Flyz远征飞｜综合工具箱 - 5.1劳动节特别版</title>
    <meta name="description" content="全国综合性航模公益服务平台 下载站支持高速免费免登录直接下载飞行模拟 3D打印等各类航模文件 欢迎加入我们 微信号:YGWFK2024" />
    <meta name="keywords" content="航模,飞行模拟,3D打印,免费下载,公益服务,劳动节" />
    <meta name="robots" content="index,follow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0f172a; }
        iframe { width: 100vw; height: 100vh; border: 0; display: block; position: relative; z-index: 1; }

        /* 极简高级加载层 */
        #loading {
            position: fixed; inset: 0; z-index: 9999;
            background: #0f172a;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease, transform 0.8s ease, visibility 0.8s;
        }

        /* 节日排版 */
        .festival-text {
            text-align: center;
            margin-bottom: 40px;
        }
        .festival-text h1 {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff4b2b, #ff416c, #ffb88c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 2px;
            animation: breathe 2s ease-in-out infinite alternate;
        }
        .festival-text p {
            color: #94a3b8;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* 极简环形进度 */
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(255, 65, 108, 0.1);
            border-top: 3px solid #ff416c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes breathe {
            0% { filter: drop-shadow(0 0 5px rgba(255,65,108,0.2)); }
            100% { filter: drop-shadow(0 0 20px rgba(255,65,108,0.8)); }
        }

        /* 隐藏动画：淡出并稍微放大 */
        #loading.hide {
            opacity: 0;
            transform: scale(1.1);
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="festival-text">
            <h1>5.1</h1>
            <p>劳动节特别版 · 致敬奋斗者</p>
        </div>
        <div class="spinner"></div>
    </div>

    <iframe src="/flyz/202604"></iframe>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const iframe = document.querySelector("iframe");
            const loading = document.getElementById("loading");
            
            let isLoaded = false;
            let timeUp = false;

            // 保证加载动画至少显示 1.2 秒
            setTimeout(() => {
                timeUp = true;
                hideIfReady();
            }, 1200);

            iframe.onload = () => {
                isLoaded = true;
                hideIfReady();
            };

            function hideIfReady() {
                if (isLoaded && timeUp) {
                    loading.classList.add("hide");
                }
            }
        });
    </script>
</body>
</html>
