<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Flyz远征飞｜综合工具箱 - 五一特别版</title>
    <meta name="description" content="全国综合性航模公益服务平台 下载站支持高速免费免登录直接下载飞行模拟 3D打印等各类航模文件 欢迎加入我们 微信号:YGWFK2024" />
    <meta name="keywords" content="航模,飞行模拟,3D打印,免费下载,公益服务,五一劳动节" />
    <meta name="robots" content="index,follow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        iframe { width: 100vw; height: 100vh; border: 0; display: block; position: relative; z-index: 1; }

        /* ================= 炫酷加载页样式 ================= */
        #loading {
            position: fixed; inset: 0;
            z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* 左右开门面板 */
        .door {
            position: absolute; top: 0; width: 50%; height: 100%;
            background: linear-gradient(135deg, #8b0000 0%, #d32f2f 100%);
            transition: transform 1s cubic-bezier(0.77, 0, 0.175, 1);
            z-index: 2;
            box-shadow: 0 0 50px rgba(0,0,0,0.5) inset;
        }
        .door.left { left: 0; border-right: 2px solid #ffd700; }
        .door.right { right: 0; border-left: 2px solid #ffd700; }

        /* 内容容器 */
        .content-box {
            position: relative; z-index: 3;
            text-align: center;
            transition: all 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        /* 齿轮引擎动画 */
        .engine {
            position: relative; width: 120px; height: 120px;
            margin: 0 auto 30px; display: flex; align-items: center; justify-content: center;
        }
        .gear-outer {
            position: absolute; inset: 0;
            border: 6px dashed #ffd700; border-radius: 50%;
            animation: spin 8s linear infinite;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }
        .gear-inner {
            position: absolute; inset: 15px;
            border: 5px solid #ffaa00; border-radius: 50%;
            border-top-color: transparent; border-bottom-color: transparent;
            animation: spin-reverse 3s linear infinite;
        }
        .gear-center {
            position: absolute; inset: 35px;
            background: radial-gradient(circle, #ffd700 0%, #ff8c00 100%);
            border-radius: 50%;
            animation: pulse-glow 2s ease-in-out infinite;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #fff; font-size: 18px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* 文字特效 */
        .title {
            font-size: 32px; font-weight: bold; letter-spacing: 4px;
            margin-bottom: 15px;
            background: linear-gradient(to right, #ffffff, #ffd700, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        .subtitle {
            font-size: 15px; color: #f8c2c2; letter-spacing: 2px;
            margin-bottom: 40px; text-transform: uppercase;
        }

        /* 进度条动画 */
        .progress-bar {
            width: 240px; height: 3px; background: rgba(255, 255, 255, 0.2);
            margin: 0 auto; border-radius: 3px; overflow: hidden; position: relative;
        }
        .progress-indicator {
            position: absolute; top: 0; left: 0; height: 100%;
            background: #ffd700; box-shadow: 0 0 10px #ffd700;
            animation: scanning 1.5s ease-in-out infinite;
        }

        /* 动画关键帧 */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 10px #ff8c00, 0 0 20px #ff8c00; transform: scale(1); }
            50% { box-shadow: 0 0 20px #ffd700, 0 0 40px #ffd700; transform: scale(1.05); }
        }
        @keyframes shine { to { background-position: 200% center; } }
        @keyframes scanning {
            0% { width: 0%; left: 0; }
            50% { width: 100%; left: 0; }
            100% { width: 0%; left: 100%; }
        }

        /* ================= 离开/隐藏状态 ================= */
        #loading.hide .door.left { transform: translateX(-100%); }
        #loading.hide .door.right { transform: translateX(100%); }
        #loading.hide .content-box { opacity: 0; transform: translateZ(200px) scale(1.5); }
        #loading.hide { pointer-events: none; }
    </style>
</head>
<body>
    
    <div id="loading">
        <div class="door left"></div>
        <div class="door right"></div>
        <div class="content-box">
            <div class="engine">
                <div class="gear-outer"></div>
                <div class="gear-inner"></div>
                <div class="gear-center">5.1</div>
            </div>
            <h1 class="title">五一劳动节快乐</h1>
            <p class="subtitle">Flyz远征飞 · 致敬每一位起飞的奋斗者</p>
            <div class="progress-bar">
                <div class="progress-indicator"></div>
            </div>
        </div>
    </div>

    <iframe src="/flyz/202605"></iframe>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const iframe = document.querySelector("iframe");
            const loading = document.getElementById("loading");
            
            let isIframeLoaded = false;
            let isMinTimeReached = false;

            // 强制加载动画至少播放 1.5 秒，保证用户能看清酷炫特效
            setTimeout(() => {
                isMinTimeReached = true;
                checkAndHideLoading();
            }, 1500);

            // 监听 iframe 加载完毕
            iframe.onload = () => {
                isIframeLoaded = true;
                checkAndHideLoading();
            };

            // 检查两个条件：时间够了 && 页面加载完了
            function checkAndHideLoading() {
                if (isIframeLoaded && isMinTimeReached) {
                    loading.classList.add("hide");
                    // 等待开门动画(1秒)结束后，将加载层从渲染树彻底隐藏以节约性能
                    setTimeout(() => {
                        loading.style.display = "none";
                    }, 1000);
                }
            }
        });
    </script>
</body>
</html>
