<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YZCloud分享卡片生成</title>
    <!-- 更换为国内稳定bootcdn源，加载零失败 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* 全局极致重置 从根节点锁死 */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            min-height: 100vh !important;
            overflow-x: hidden !important;
            box-sizing: border-box !important;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box !important;
            flex-shrink: 0;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #3b82f6, #06b6d4);
            --card-bg: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.08);
            --shadow-card: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        /* 页面主体 严格居中锁死 */
        body {
            position: relative;
            background: #0a0e17;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            padding: 20px 16px !important;
            gap: 32px !important;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Roboto, Arial, sans-serif;
        }

        /* 背景动画 严格不干扰前景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 70%, rgba(124, 58, 237, 0.2) 0%, transparent 50%);
            animation: bgFlow 12s ease-in-out infinite alternate;
            z-index: 0 !important;
            pointer-events: none !important;
            will-change: transform;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0 !important;
            pointer-events: none !important;
        }

        @keyframes bgFlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-5%, -5%) scale(1.1); }
        }

        /* 操作面板 严格尺寸约束 */
        .control-panel {
            position: relative !important;
            z-index: 10 !important;
            width: 100% !important;
            max-width: 420px !important;
            min-width: 300px !important;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px !important;
            padding: 28px 24px !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: stretch !important;
            gap: 20px !important;
            flex-grow: 0 !important;
            flex-shrink: 0 !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            overflow: hidden !important;
        }

        .panel-title {
            width: 100% !important;
            font-size: 20px !important;
            font-weight: 600 !important;
            text-align: center !important;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.4 !important;
        }

        .input-group {
            width: 100% !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: stretch !important;
            gap: 8px !important;
        }

        .input-group label {
            width: 100% !important;
            font-size: 14px !important;
            color: #cbd5e1 !important;
            font-weight: 500 !important;
            padding-left: 4px !important;
            line-height: 1.4 !important;
            text-align: left !important;
        }

        .input-group input {
            width: 100% !important;
            height: 48px !important;
            padding: 0 18px !important;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px !important;
            color: #fff !important;
            font-size: 15px !important;
            outline: none !important;
            transition: all 0.3s ease;
            line-height: 48px !important;
        }

        .input-group input:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15), 0 0 20px rgba(59, 130, 246, 0.2) !important;
            background: rgba(0, 0, 0, 0.3) !important;
        }

        .action-buttons {
            width: 100% !important;
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
            margin-top: 4px !important;
        }

        .btn {
            flex: 1 !important;
            height: 48px !important;
            border-radius: 14px !important;
            border: none !important;
            font-size: 15px !important;
            font-weight: 600 !important;
            cursor: pointer !important;
            transition: all 0.2s ease !important;
            line-height: 48px !important;
            padding: 0 !important;
            text-align: center !important;
        }

        .btn-primary {
            background: var(--primary-gradient) !important;
            color: #fff !important;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3) !important;
        }

        .btn-primary:active {
            transform: scale(0.97) !important;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
        }

        .btn-secondary:active {
            transform: scale(0.97) !important;
            background: rgba(255, 255, 255, 0.15) !important;
        }

        .btn:disabled {
            opacity: 0.5 !important;
            cursor: not-allowed !important;
            transform: none !important;
            box-shadow: none !important;
        }

        /* 核心分享卡片 极致严格约束 杜绝歪斜 */
        .share-card {
            position: relative !important;
            z-index: 10 !important;
            width: 100% !important;
            max-width: 420px !important;
            min-width: 300px !important;
            aspect-ratio: 3/4 !important;
            background: var(--card-bg) !important;
            border-radius: 32px !important;
            padding: 48px 40px !important;
            margin: 0 !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: flex-start !important;
            box-shadow: var(--shadow-card) !important;
            overflow: hidden !important;
            flex-grow: 0 !important;
            flex-shrink: 0 !important;
        }

        /* 卡片内部所有模块 严格100%宽度 居中对齐 锁死间距 */
        .card-header {
            width: 100% !important;
            display: flex !important;
            flex-direction: row !important;
            align-items: center !important;
            justify-content: space-between !important;
            margin: 0 0 56px 0 !important;
            padding: 0 !important;
            z-index: 1 !important;
        }

        .brand-logo {
            display: flex !important;
            align-items: center !important;
            gap: 6px !important;
            font-size: 18px !important;
            font-weight: 700 !important;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2 !important;
        }

        .brand-tag {
            padding: 4px 10px !important;
            background: rgba(59, 130, 246, 0.1) !important;
            border-radius: 999px !important;
            font-size: 12px !important;
            font-weight: 600 !important;
            color: #3b82f6 !important;
            line-height: 1.2 !important;
        }

        .card-content {
            width: 100% !important;
            text-align: center !important;
            margin: 0 0 40px 0 !important;
            padding: 0 !important;
            z-index: 1 !important;
        }

        .username-text {
            width: 100% !important;
            font-size: 28px !important;
            font-weight: 700 !important;
            color: var(--text-dark) !important;
            margin: 0 0 8px 0 !important;
            line-height: 1.2 !important;
            text-align: center !important;
            padding: 0 !important;
        }

        .share-desc {
            width: 100% !important;
            font-size: 16px !important;
            color: var(--text-muted) !important;
            line-height: 1.5 !important;
            text-align: center !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        /* 二维码容器 严格固定尺寸 居中锁死 */
        .qrcode-wrapper {
            width: 224px !important;
            height: 224px !important;
            background: #ffffff !important;
            border-radius: 24px !important;
            padding: 12px !important;
            margin: 0 0 32px 0 !important;
            box-shadow: var(--shadow-soft) !important;
            z-index: 1 !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            flex-shrink: 0 !important;
        }

        #qrcode {
            width: 200px !important;
            height: 200px !important;
            border-radius: 12px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            overflow: hidden !important;
        }

        #qrcode img, #qrcode canvas {
            width: 100% !important;
            height: 100% !important;
            display: block !important;
            border-radius: 12px !important;
        }

        .card-footer {
            width: 100% !important;
            text-align: center !important;
            margin: auto 0 0 0 !important;
            padding: 0 !important;
            z-index: 1 !important;
        }

        .scan-tip {
            width: 100% !important;
            font-size: 15px !important;
            color: var(--text-muted) !important;
            margin: 0 0 12px 0 !important;
            line-height: 1.4 !important;
            text-align: center !important;
        }

        .bottom-watermark {
            width: 100% !important;
            font-size: 11px !important;
            color: rgba(0, 0, 0, 0.15) !important;
            font-weight: 500 !important;
            line-height: 1.2 !important;
            text-align: center !important;
            margin: 0 !important;
        }

        /* 竖屏严格适配 杜绝歪斜 */
        @media (orientation: portrait) {
            body {
                flex-direction: column !important;
                align-items: center !important;
                justify-content: center !important;
                padding: 20px 16px !important;
                gap: 24px !important;
            }
            .control-panel, .share-card {
                max-width: 100% !important;
                width: 100% !important;
            }
            .share-card {
                aspect-ratio: 3/4 !important;
                padding: 40px 32px !important;
            }
            .card-header {
                margin-bottom: 48px !important;
            }
            .username-text {
                font-size: 26px !important;
            }
            .qrcode-wrapper {
                width: 200px !important;
                height: 200px !important;
            }
            #qrcode {
                width: 176px !important;
                height: 176px !important;
            }
        }

        /* 横屏严格适配 强制双栏 完整显示 杜绝溢出 */
        @media (orientation: landscape) {
            body {
                flex-direction: row !important;
                flex-wrap: nowrap !important;
                align-items: center !important;
                justify-content: center !important;
                padding: 20px !important;
                gap: 40px !important;
                min-height: 100vh !important;
                height: 100% !important;
            }
            .control-panel {
                max-width: 380px !important;
                width: 45% !important;
                max-height: 95vh !important;
                overflow-y: auto !important;
            }
            .share-card {
                max-width: 380px !important;
                width: 45% !important;
                max-height: 95vh !important;
                height: auto !important;
                aspect-ratio: 3/4 !important;
                padding: 40px 32px !important;
            }
            .card-header {
                margin-bottom: 40px !important;
            }
            .username-text {
                font-size: 24px !important;
            }
            .qrcode-wrapper {
                width: 180px !important;
                height: 180px !important;
                margin-bottom: 24px !important;
            }
            #qrcode {
                width: 156px !important;
                height: 156px !important;
            }
        }

        /* 小屏横屏额外约束 */
        @media (orientation: landscape) and (max-width: 767px) {
            body {
                gap: 20px !important;
                padding: 16px !important;
            }
            .control-panel {
                padding: 20px !important;
                width: 48% !important;
            }
            .share-card {
                padding: 28px 24px !important;
                width: 48% !important;
            }
            .brand-logo {
                font-size: 16px !important;
            }
            .brand-tag {
                font-size: 10px !important;
                padding: 3px 8px !important;
            }
            .username-text {
                font-size: 20px !important;
            }
            .share-desc {
                font-size: 14px !important;
            }
            .qrcode-wrapper {
                width: 140px !important;
                height: 140px !important;
                padding: 8px !important;
            }
            #qrcode {
                width: 124px !important;
                height: 124px !important;
            }
            .scan-tip {
                font-size: 13px !important;
            }
        }

        /* 超小屏竖屏约束 */
        @media (orientation: portrait) and (max-width: 375px) {
            .share-card {
                padding: 32px 24px !important;
            }
            .card-header {
                margin-bottom: 40px !important;
            }
            .username-text {
                font-size: 24px !important;
            }
            .qrcode-wrapper {
                width: 180px !important;
                height: 180px !important;
            }
            #qrcode {
                width: 156px !important;
                height: 156px !important;
            }
        }
    </style>
</head>
<body>
    <!-- 操作面板 -->
    <div class="control-panel">
        <div class="panel-title">YZCloud 分享卡片生成</div>
        <div class="input-group">
            <label>用户名称</label>
            <input type="text" id="username" placeholder="请输入分享用户昵称" autocomplete="off">
        </div>
        <div class="input-group">
            <label>资源链接</label>
            <input type="text" id="resourceLink" placeholder="粘贴资源链接，自动生成二维码" autocomplete="off">
        </div>
        <div class="action-buttons">
            <button class="btn btn-primary" id="generateBtn">刷新预览</button>
            <button class="btn btn-secondary" id="saveBtn" disabled>保存卡片</button>
        </div>
    </div>

    <!-- 最终分享卡片 -->
    <div class="share-card" id="shareCard">
        <div class="card-header">
            <div class="brand-logo">☁️ YZCloud 网盘</div>
            <div class="brand-tag">安全分享</div>
        </div>

        <div class="card-content">
            <div class="username-text" id="showUsername">用户 匿名</div>
            <div class="share-desc">通过 YZCloud 网盘分享了资源</div>
        </div>

        <div class="qrcode-wrapper">
            <div id="qrcode"></div>
        </div>

        <div class="card-footer">
            <div class="scan-tip">长按识别二维码 · 快速获取资源</div>
            <div class="bottom-watermark">yzbjfpv.top/cloud</div>
        </div>
    </div>

    <script>
        // 元素获取
        const usernameInput = document.getElementById('username');
        const linkInput = document.getElementById('resourceLink');
        const showUsername = document.getElementById('showUsername');
        const qrcodeEl = document.getElementById('qrcode');
        const generateBtn = document.getElementById('generateBtn');
        const saveBtn = document.getElementById('saveBtn');
        const shareCard = document.getElementById('shareCard');

        // 全局二维码实例，用于清空重绘
        let qrcodeInstance = null;

        // 防抖优化
        const debounce = (fn, delay = 200) => {
            let timer = null;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, args), delay);
            };
        };

        // 读取本地缓存用户名
        const initCache = () => {
            const savedUsername = localStorage.getItem('yzcloud_username');
            if (savedUsername) {
                usernameInput.value = savedUsername;
                showUsername.textContent = `用户 ${savedUsername}`;
            }
        };

        // 全新二维码生成逻辑 零失败
        const generateQRCode = (originLink) => {
            // 清空之前的二维码实例和内容
            if (qrcodeInstance) qrcodeInstance.clear();
            qrcodeEl.innerHTML = '';
            saveBtn.disabled = true;

            // 空链接不生成
            if (!originLink || originLink.trim() === '') {
                return;
            }
            
            // 拼接跳转地址，自动编码处理链接
            const targetUrl = `https://yzbjfpv.top/cloud/share/loading?=${encodeURIComponent(originLink.trim())}`;
            
            // 生成二维码 兼容性拉满
            try {
                qrcodeInstance = new QRCode(qrcodeEl, {
                    text: targetUrl,
                    width: 200,
                    height: 200,
                    colorDark: '#0f172a',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H // 最高纠错级别
                });
                // 生成成功解锁保存按钮
                setTimeout(() => {
                    saveBtn.disabled = false;
                }, 100);
            } catch (error) {
                console.error('二维码生成失败：', error);
                alert('二维码生成失败，请检查链接后重试');
            }
        };

        // 更新卡片预览
        const updateCard = debounce(() => {
            const username = usernameInput.value.trim();
            const originLink = linkInput.value.trim();
            
            // 更新用户名显示
            showUsername.textContent = username ? `用户 ${username}` : '用户 匿名';
            // 缓存用户名
            if (username) localStorage.setItem('yzcloud_username', username);
            // 生成二维码
            generateQRCode(originLink);
        });

        // 保存高清卡片
        const saveCardToImage = async () => {
            if (saveBtn.disabled) return;
            
            saveBtn.disabled = true;
            saveBtn.textContent = '保存中...';
            
            try {
                const canvas = await html2canvas(shareCard, {
                    scale: 4,
                    useCORS: true,
                    backgroundColor: '#f8fafc',
                    logging: false
                });
                
                const link = document.createElement('a');
                link.download = `YZCloud分享卡片_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            } catch (error) {
                alert('保存失败，请重试');
                console.error(error);
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '保存卡片';
            }
        };

        // 事件绑定
        usernameInput.addEventListener('input', updateCard);
        linkInput.addEventListener('input', updateCard);
        linkInput.addEventListener('paste', updateCard);
        generateBtn.addEventListener('click', updateCard);
        saveBtn.addEventListener('click', saveCardToImage);

        // 页面初始化 检查库是否加载成功
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof QRCode === 'undefined') {
                alert('二维码库加载失败，请刷新页面重试');
                return;
            }
            initCache();
            updateCard();
        });
    </script>
</body>
</html>
