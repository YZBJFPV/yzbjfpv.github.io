<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YZCloud分享卡片生成</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Roboto, Arial, sans-serif;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #3b82f6, #06b6d4);
            --card-bg: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.08);
            --shadow-card: 0 20px 60px rgba(0, 0, 0, 0.12);
        }

        body {
            min-height: 100vh;
            background: linear-gradient(160deg, #0f172a, #1e293b);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            color: #fff;
        }

        /* 操作面板 */
        .control-panel {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 14px;
            color: #cbd5e1;
            font-weight: 500;
            padding-left: 4px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 4px;
        }

        .btn {
            flex: 1;
            padding: 15px 0;
            border-radius: 14px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: #fff;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-secondary:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* 核心分享卡片 */
        .share-card {
            position: relative;
            width: 100%;
            max-width: 440px;
            aspect-ratio: 3/4;
            background: var(--card-bg);
            border-radius: 32px;
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: var(--shadow-card);
            overflow: hidden;
        }

        /* 顶部品牌栏 */
        .card-header {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 56px;
            z-index: 1;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-tag {
            padding: 4px 10px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            color: #3b82f6;
        }

        /* 文案区域 分层排版 */
        .card-content {
            width: 100%;
            text-align: center;
            margin-bottom: 40px;
            z-index: 1;
        }

        .username-text {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .share-desc {
            font-size: 16px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* 二维码容器 */
        .qrcode-wrapper {
            background: #ffffff;
            border-radius: 24px;
            padding: 16px;
            box-shadow: var(--shadow-soft);
            z-index: 1;
            margin-bottom: 32px;
        }

        #qrcode {
            width: 200px !important;
            height: 200px !important;
            border-radius: 12px;
        }

        /* 底部提示 */
        .card-footer {
            margin-top: auto;
            text-align: center;
            z-index: 1;
        }

        .scan-tip {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .bottom-watermark {
            font-size: 11px;
            color: rgba(0, 0, 0, 0.15);
            font-weight: 500;
        }

        /* 响应式适配 */
        @media (max-width: 480px) {
            .share-card {
                padding: 36px 28px;
                aspect-ratio: 2/3;
            }
            .username-text {
                font-size: 24px;
            }
            #qrcode {
                width: 180px !important;
                height: 180px !important;
            }
        }
    </style>
</head>
<body>
    <!-- 操作面板 -->
    <div class="control-panel">
        <div class="panel-title">YZCloud 分享卡片生成</div>
        <div class="input-group">
            <label>用户名称</label>
            <input type="text" id="username" placeholder="请输入分享用户昵称" autocomplete="off">
        </div>
        <div class="input-group">
            <label>资源链接</label>
            <input type="url" id="resourceLink" placeholder="粘贴资源链接，自动生成二维码" autocomplete="off">
        </div>
        <div class="action-buttons">
            <button class="btn btn-primary" id="generateBtn">刷新预览</button>
            <button class="btn btn-secondary" id="saveBtn" disabled>保存卡片</button>
        </div>
    </div>

    <!-- 最终分享卡片 -->
    <div class="share-card" id="shareCard">
        <div class="card-header">
            <div class="brand-logo">☁️ YZCloud 网盘</div>
            <div class="brand-tag">安全分享</div>
        </div>

        <div class="card-content">
            <div class="username-text" id="showUsername">用户 匿名</div>
            <div class="share-desc">通过 YZCloud 网盘分享了资源</div>
        </div>

        <div class="qrcode-wrapper">
            <div id="qrcode"></div>
        </div>

        <div class="card-footer">
            <div class="scan-tip">长按识别二维码 · 快速获取资源</div>
            <div class="bottom-watermark">yzbjfpv.top/cloud</div>
        </div>
    </div>

    <script>
        // 元素获取
        const usernameInput = document.getElementById('username');
        const linkInput = document.getElementById('resourceLink');
        const showUsername = document.getElementById('showUsername');
        const qrcodeEl = document.getElementById('qrcode');
        const generateBtn = document.getElementById('generateBtn');
        const saveBtn = document.getElementById('saveBtn');
        const shareCard = document.getElementById('shareCard');

        // 防抖优化
        const debounce = (fn, delay = 300) => {
            let timer = null;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, args), delay);
            };
        };

        // 读取本地缓存用户名
        const initCache = () => {
            const savedUsername = localStorage.getItem('yzcloud_username');
            if (savedUsername) {
                usernameInput.value = savedUsername;
                showUsername.textContent = `用户 ${savedUsername}`;
            }
        };

        // 生成二维码核心逻辑（已修改为跳转loading页）
        const generateQRCode = (originLink) => {
            if (!originLink) {
                saveBtn.disabled = true;
                return;
            }
            // 拼接跳转地址，自动编码处理链接
            const targetUrl = `https://yzbjfpv.top/cloud/share/loading?=${encodeURIComponent(originLink)}`;
            QRCode.toCanvas(qrcodeEl, targetUrl, {
                width: 200,
                margin: 0,
                errorCorrectionLevel: 'H',
                color: {
                    dark: '#0f172a',
                    light: '#ffffff'
                }
            }, (error) => {
                if (!error) saveBtn.disabled = false;
            });
        };

        // 更新卡片预览
        const updateCard = debounce(() => {
            const username = usernameInput.value.trim();
            const originLink = linkInput.value.trim();
            
            // 更新用户名显示
            showUsername.textContent = username ? `用户 ${username}` : '用户 匿名';
            // 缓存用户名
            if (username) localStorage.setItem('yzcloud_username', username);
            // 生成二维码
            generateQRCode(originLink);
        });

        // 保存高清卡片
        const saveCardToImage = async () => {
            saveBtn.disabled = true;
            saveBtn.textContent = '保存中...';
            
            try {
                const canvas = await html2canvas(shareCard, {
                    scale: 4,
                    useCORS: true,
                    backgroundColor: '#f8fafc',
                    logging: false
                });
                
                const link = document.createElement('a');
                link.download = `YZCloud分享卡片_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            } catch (error) {
                alert('保存失败，请重试');
                console.error(error);
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '保存卡片';
            }
        };

        // 事件绑定
        usernameInput.addEventListener('input', updateCard);
        linkInput.addEventListener('input', updateCard);
        generateBtn.addEventListener('click', updateCard);
        saveBtn.addEventListener('click', saveCardToImage);

        // 页面初始化
        window.addEventListener('DOMContentLoaded', () => {
            initCache();
            updateCard();
        });
    </script>
</body>
</html>
