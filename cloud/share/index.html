<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>分享卡片</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}

/* 大背景：深色科技感，完全不透明 */
body{
  min-height:100vh;
  background:linear-gradient(135deg, #0f172a, #1e293b, #334155);
  display:flex;align-items:center;justify-content:center;padding:24px;
}

.container{
  display:flex;gap:32px;max-width:1000px;width:100%;
  flex-wrap:wrap;justify-content:center;
}

/* 左侧面板：不透明 + 右侧卡片同款蓝色 */
.control-panel{
  flex:1;min-width:340px;
  background:linear-gradient(180deg, #e0f2fe, #7dd3fc);
  border-radius:20px;
  padding:32px;
  display:flex;flex-direction:column;gap:24px;
}

.panel-title{
  font-size:24px;font-weight:700;
  color:#1e40af;
}

.form-group{
  display:flex;flex-direction:column;gap:10px;
}

.form-label{
  font-size:15px;color:#1e3a8a;font-weight:500;
}

.form-input{
  background:#ffffff;
  border:1px solid #cbd5e1;
  border-radius:14px;
  padding:16px;color:#0f172a;font-size:15px;outline:none;
}

.form-input:focus{
  border-color:#3b82f6;
}

.btn-group{
  display:flex;gap:14px;margin-top:4px;
}

.btn{
  flex:1;border:none;border-radius:14px;padding:16px;
  font-size:15px;font-weight:600;cursor:pointer;
}

.btn-refresh{
  background:#3b82f6;color:#fff;
}

.btn-save{
  background:#2563eb;color:#fff;
}

/* 卡片：高级蓝色渐变 */
.card{
  width:340px;height:520px;
  background:linear-gradient(180deg, #f0f9ff 0%, #e0f2fe 35%, #7dd3fc 130%);
  border-radius:28px;
  padding:40px 32px;
  display:flex;flex-direction:column;
  box-shadow:0 15px 35px rgba(0,0,0,0.08);
  position:relative;
}

/* 云图标 */
.cloud-icon {
  width:28px;
  height:28px;
  position:relative;
  margin-right:10px;
}
.cloud-icon::before {
  content:"";
  position:absolute;
  top:10px; left:2px;
  width:14px; height:14px;
  background:#2563eb;
  border-radius:50%;
}
.cloud-icon::after {
  content:"";
  position:absolute;
  top:6px; left:10px;
  width:16px; height:16px;
  background:#2563eb;
  border-radius:50%;
}
.cloud-icon span {
  position:absolute;
  bottom:2px; left:0;
  width:28px; height:12px;
  background:#2563eb;
  border-radius:6px;
}

.card-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:44px;
}

/* YZCloud 彩色渐变 */
.logo-wrap{
  display:flex;align-items:center;
  font-size:21px;font-weight:800;
  background:linear-gradient(90deg,#1e40af,#3b82f6,#60a5fa);
  -webkit-background-clip:text;
  color:transparent;
}

.tag{
  background:rgba(59,130,246,0.15);
  color:#2563eb;
  font-size:13px;
  padding:6px 12px;
  border-radius:12px;
  font-weight:600;
}

.card-body{
  display:flex;flex-direction:column;align-items:center;text-align:center;
}

.username{
  font-size:24px;font-weight:700;color:#0f172a;margin-bottom:8px;
}

.desc{
  font-size:15px;color:#64748b;margin-bottom:40px;
}

.qrcode-box{
  width:190px;height:190px;
  background:#fff;
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 20px rgba(0,0,0,0.07);
  padding:12px;
  margin-bottom:36px;
}

#qrcode{
  width:100%!important;height:100%!important;
}

.tip{
  font-size:14px;color:#475569;font-weight:500;
  margin-bottom:20px;
}

.watermark{
  font-size:12px;color:#9ca3af;font-weight:400;
}

@media(max-width:768px){
  .container{flex-direction:column;align-items:center}
  .control-panel{width:100%}
}
</style>
</head>
<body>

<div class="container">
  <div class="control-panel">
    <h2 class="panel-title">YZCloud 分享生成器</h2>
    <div class="form-group">
      <label class="form-label">用户名称</label>
      <input type="text" class="form-input" id="username" placeholder="请输入昵称">
    </div>
    <div class="form-group">
      <label class="form-label">分享链接</label>
      <input type="url" class="form-input" id="link" placeholder="https://">
    </div>
    <div class="btn-group">
      <button class="btn btn-refresh" id="refresh">刷新预览</button>
      <button class="btn btn-save" id="save">保存卡片</button>
    </div>
  </div>

  <div class="card" id="card">
    <div class="card-header">
      <div class="logo-wrap">
        <div class="cloud-icon"><span></span></div>
        YZCloud
      </div>
      <div class="tag">安全分享</div>
    </div>
    <div class="card-body">
      <div class="username" id="showName">用户 匿名</div>
      <div class="desc">通过 YZCloud 分享了资源</div>
      <div class="qrcode-box"><div id="qrcode"></div></div>
      <div class="tip">长按识别二维码 · 快速获取资源</div>
      <div class="watermark">yzbjfpv.top/cloud</div>
    </div>
  </div>
</div>

<script>
const prefix = "https://yzbjfpv.top/share/loading.html?=";
const usernameInput = document.getElementById('username');
const linkInput = document.getElementById('link');
const showName = document.getElementById('showName');
const qrcodeEl = document.getElementById('qrcode');
const card = document.getElementById('card');

function makeQR(url) {
  qrcodeEl.innerHTML = '';
  const target = prefix + encodeURIComponent(url);
  QRCode.toCanvas(qrcodeEl, target, {
    width: 166, margin: 0, color: { dark: "#111827", light: "#fff" }
  });
}

usernameInput.addEventListener('input', () => {
  const name = usernameInput.value.trim() || '匿名';
  showName.textContent = `用户 ${name}`;
});

linkInput.addEventListener('input', () => {
  const url = linkInput.value.trim();
  if(url) makeQR(url);
});

document.getElementById('refresh').onclick = () => {
  const name = usernameInput.value.trim() || '匿名';
  const url = linkInput.value.trim();
  showName.textContent = `用户 ${name}`;
  if(url) makeQR(url);
};

document.getElementById('save').onclick = async () => {
  const canvas = await html2canvas(card, { scale:4, useCORS:true, logging:false });
  const a = document.createElement('a');
  a.download = 'YZCloud分享卡片.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
};

makeQR('');
</script>
</body>
</html>
