<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YZCloud分享卡片生成</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Roboto, Arial, sans-serif;
        }

        :root {
            --primary: #3b82f6;
            --primary-gradient: linear-gradient(135deg, #3b82f6, #06b6d4);
            --card-bg-soft: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --qrcode-box-size: 220px;
        }

        body {
            position: relative;
            background: #0a0e17;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 16px;
            gap: 32px;
            color: #fff;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.3) 0%, transparent 50%);
            animation: bgFlow 12s ease-in-out infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes bgFlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-5%, -5%) scale(1.1); }
        }

        .control-panel {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 14px;
            color: #cbd5e1;
            font-weight: 500;
            padding-left: 4px;
        }

        .input-group input {
            width: 100%;
            height: 48px;
            padding: 0 18px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 4px;
        }

        .btn {
            flex: 1;
            height: 48px;
            border-radius: 14px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: #fff;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-secondary:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .share-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            aspect-ratio: 3/4;
            background: var(--card-bg-soft);
            border-radius: 32px;
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .card-header {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 56px;
            flex-shrink: 0;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
            white-space: nowrap;
        }

        .brand-tag {
            padding: 4px 10px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            line-height: 1.2;
            white-space: nowrap;
        }

        .card-content {
            width: 100%;
            text-align: center;
            margin-bottom: 40px;
            flex-shrink: 0;
        }

        .username-text {
            width: 100%;
            font-size: 28px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
            line-height: 1.2;
            text-align: center;
            word-break: keep-all;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .share-desc {
            width: 100%;
            font-size: 16px;
            color: var(--text-muted);
            line-height: 1.5;
            text-align: center;
            white-space: nowrap;
        }

        /* ============================================== */
        /* 外层白框：保留圆角 */
        .qrcode-box {
            width: var(--qrcode-box-size);
            height: var(--qrcode-box-size);
            background: #ffffff;
            border-radius: 16px; /* 这个圆角保留 */
            padding: 0;
            margin-bottom: 32px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        /* 二维码本身：0 圆角，完整直角，不被切 */
        #qrcode-img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
            border-radius: 0 !important; /* 内层圆角彻底删掉 */
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        /* ============================================== */

        .card-footer {
            margin-top: auto;
            text-align: center;
            width: 100%;
            flex-shrink: 0;
        }

        .scan-tip {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 12px;
            line-height: 1.4;
            text-align: center;
            white-space: nowrap;
        }

        .watermark {
            font-size: 11px;
            color: rgba(0, 0, 0, 0.15);
            font-weight: 500;
            line-height: 1.2;
            text-align: center;
            white-space: nowrap;
        }

        @media (orientation: portrait) and (max-width: 480px) {
            :root {
                --qrcode-box-size: 200px;
            }
            body {
                padding: 20px 16px;
                gap: 24px;
                justify-content: flex-start;
                padding-top: 30px;
            }
            .control-panel, .share-card {
                max-width: 100%;
            }
            .share-card {
                padding: 40px 32px;
            }
            .username-text {
                font-size: 26px;
            }
        }

        @media (orientation: landscape) {
            :root {
                --qrcode-box-size: 180px;
            }
            body {
                flex-direction: row;
                flex-wrap: nowrap;
                align-items: center;
                justify-content: center;
                padding: 20px;
                gap: 40px;
                min-height: 100vh;
            }
            .control-panel {
                max-width: 380px;
                width: 45%;
                max-height: 95vh;
                overflow-y: auto;
            }
            .share-card {
                max-width: 380px;
                width: 45%;
                max-height: 95vh;
                padding: 40px 32px;
            }
            .username-text {
                font-size: 24px;
            }
        }

        @media (orientation: landscape) and (max-width: 767px) {
            :root {
                --qrcode-box-size: 140px;
            }
            body {
                gap: 20px;
                padding: 16px;
            }
            .control-panel {
                padding: 20px;
                width: 48%;
            }
            .share-card {
                padding: 28px 24px;
                width: 48%;
            }
            .username-text {
                font-size: 20px;
            }
            .qrcode-box {
                margin-bottom: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <div class="panel-title">YZCloud 分享卡片生成</div>
        <div class="input-group">
            <label>用户名称</label>
            <input type="text" id="username" placeholder="请输入分享用户昵称" autocomplete="off">
        </div>
        <div class="input-group">
            <label>资源链接</label>
            <input type="text" id="resourceLink" placeholder="粘贴资源链接，自动生成二维码" autocomplete="off">
        </div>
        <div class="action-buttons">
            <button class="btn btn-primary" id="generateBtn">刷新预览</button>
            <button class="btn btn-secondary" id="saveBtn" disabled>保存卡片</button>
        </div>
    </div>

    <div class="share-card" id="shareCard">
        <div class="card-header">
            <div class="brand-logo">☁️ YZCloud 网盘</div>
            <div class="brand-tag">安全分享</div>
        </div>

        <div class="card-content">
            <div class="username-text" id="showUsername">用户 匿名</div>
            <div class="share-desc">通过 YZCloud 网盘分享了资源</div>
        </div>

        <div class="qrcode-box">
            <img id="qrcode-img" alt="资源二维码" />
        </div>

        <div class="card-footer">
            <div class="scan-tip">长按识别二维码 · 快速获取资源</div>
            <div class="watermark">yzbjfpv.top/cloud</div>
        </div>
    </div>

    <script>
        const usernameInput = document.getElementById('username');
        const linkInput = document.getElementById('resourceLink');
        const showUsername = document.getElementById('showUsername');
        const qrcodeImg = document.getElementById('qrcode-img');
        const generateBtn = document.getElementById('generateBtn');
        const saveBtn = document.getElementById('saveBtn');
        const shareCard = document.getElementById('shareCard');

        const debounce = (fn, delay = 200) => {
            let timer = null;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, args), delay);
            };
        };

        const initCache = () => {
            const savedUsername = localStorage.getItem('yzcloud_username');
            if (savedUsername) {
                usernameInput.value = savedUsername;
                showUsername.textContent = `用户 ${savedUsername}`;
            }
        };

        const generateQRCode = (originLink) => {
            qrcodeImg.src = '';
            saveBtn.disabled = true;
            if (!originLink || originLink.trim() === '') return;

            const targetUrl = `https://yzbjfpv.top/cloud/share/loading?=${encodeURIComponent(originLink.trim())}`;
            const qrcodeSize = qrcodeImg.clientWidth;

            const tempDiv = document.createElement('div');
            tempDiv.style.display = 'none';
            document.body.appendChild(tempDiv);

            new QRCode(tempDiv, {
                text: targetUrl,
                width: qrcodeSize,
                height: qrcodeSize,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });

            setTimeout(() => {
                const canvas = tempDiv.querySelector('canvas');
                if (canvas) {
                    qrcodeImg.src = canvas.toDataURL('image/png');
                    qrcodeImg.onload = () => {
                        saveBtn.disabled = false;
                    };
                }
                document.body.removeChild(tempDiv);
            }, 100);
        };

        const updateCard = debounce(() => {
            const username = usernameInput.value.trim();
            const originLink = linkInput.value.trim();
            showUsername.textContent = username ? `用户 ${username}` : '用户 匿名';
            if (username) localStorage.setItem('yzcloud_username', username);
            generateQRCode(originLink);
        });

        window.addEventListener('resize', debounce(() => {
            const originLink = linkInput.value.trim();
            generateQRCode(originLink);
        }, 300));

        const saveCardToImage = async () => {
            if (saveBtn.disabled) return;
            saveBtn.disabled = true;
            saveBtn.textContent = '保存中...';
            try {
                const canvas = await html2canvas(shareCard, {
                    scale: 4,
                    useCORS: true,
                    backgroundColor: '#f8fafc',
                    logging: false
                });
                const link = document.createElement('a');
                link.download = `YZCloud分享卡片_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            } catch (error) {
                alert('保存失败，请重试');
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '保存卡片';
            }
        };

        usernameInput.addEventListener('input', updateCard);
        linkInput.addEventListener('input', updateCard);
        linkInput.addEventListener('paste', updateCard);
        generateBtn.addEventListener('click', updateCard);
        saveBtn.addEventListener('click', saveCardToImage);

        window.addEventListener('DOMContentLoaded', () => {
            initCache();
            setTimeout(updateCard, 200);
        });
    </script>
</body>
</html>
