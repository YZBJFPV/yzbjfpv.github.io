<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理｜YZCloud 智能硬盘后台管理系统 (AI 边缘增强版)</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #090d16 0%, #111827 100%);
            --panel-bg: rgba(17, 24, 39, 0.7);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-primary: #3b82f6;
            --accent-success: #10b981;
            --accent-danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { min-height: 100vh; background: var(--bg-gradient); color: var(--text-main); padding: 40px 20px; display: flex; justify-content: center; }
        .main-container { width: 100%; max-width: 1400px; background: rgba(10, 15, 30, 0.8); backdrop-filter: blur(20px); border-radius: 24px; padding: 32px; border: 1px solid var(--panel-border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; border-bottom: 1px solid var(--panel-border); padding-bottom: 20px; }
        h1 { font-size: 26px; background: linear-gradient(to right, #fff, #9ca3af); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 24px; margin-bottom: 32px; }
        .card { background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 16px; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        
        /* 智能视觉扫描视窗 */
        .video-wrapper { position: relative; width: 100%; height: 280px; border-radius: 12px; overflow: hidden; background: #000; border: 1px solid rgba(255,255,255,0.1); }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        /* ROI 智能聚焦框：提示用户将条码/文字对准中央，大幅提升小模型识别率 */
        .roi-box { position: absolute; top: 50%; left: 50%; transform: translate(-250%, -50%); width: 280px; height: 80px; border: 2px solid var(--accent-primary); border-radius: 8px; box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.6); pointer-events: none; transition: border-color 0.3s; z-index: 10; }
        .roi-box::before { content: '请将条码/SN码或文本对准此框'; position: absolute; top: -25px; left: 0; width: 100%; text-align: center; color: var(--accent-primary); font-size: 11px; letter-spacing: 1px; }
        .roi-active { border-color: var(--accent-success) !important; }
        .roi-active::before { color: var(--accent-success) !important; content: '核心目标捕获中...'; }

        .scanner-laser { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--accent-primary), transparent); animation: scan 2s linear infinite; display: none; z-index: 11; }
        @keyframes scan { 0% { top: 35%; } 50% { top: 65%; } 100% { top: 35%; } }

        #canvas, #roiCanvas { display: none; }
        .result-box { background: rgba(0, 0, 0, 0.4); border: 1px dashed rgba(255, 255, 255, 0.1); padding: 14px; border-radius: 8px; font-size: 14px; min-height: 54px; }
        .result-box span { color: #60a5fa; font-family: monospace; font-weight: 600; word-break: break-all; }
        
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 11px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--accent-primary); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background: rgba(255,255,255,0.08); color: var(--text-main); border: 1px solid rgba(255,255,255,0.05); }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }
        .btn-danger { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); color: #fca5a5; }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.4); }

        /* 表格与弹窗 */
        .table-container { background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 16px; overflow: hidden; margin-top: 24px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { background: rgba(0,0,0,0.3); padding: 16px 20px; color: var(--text-muted); font-size: 13px; border-bottom: 1px solid var(--panel-border); }
        td { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.04); }
        tr.selected-row { background: rgba(59, 130, 246, 0.1) !important; border-left: 4px solid var(--accent-primary); }
        
        input[type="text"], input[type="number"], select { width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: var(--text-main); margin-top: 6px; }
        label { font-size: 13px; color: var(--text-muted); }
        .file-cell { max-width: 260px; max-height: 120px; overflow-y: auto; }
        .file-item { display: flex; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 4px; margin-bottom: 4px; font-size: 12px; }
        
        .modal-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 999; }
        .modal-box { width: 460px; padding: 28px; background: #1f2937; border-radius: 16px; display: flex; flex-direction: column; gap: 16px; border: 1px solid rgba(255,255,255,0.1); }
        .hide { display: none !important; }
        .progress-wrap { width: 100px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent-primary); width: 0%; }
    </style>
</head>
<body>
    <div class="main-container">
        <header>
            <div>
                <h1>YZCloud 智能硬盘后台管理系统</h1>
                <p style="color: var(--text-muted); font-size: 13px; margin-top:4px;">Edge-AI 增强版：支持本地硬件加速码制识别与智能文本清洗</p>
            </div>
        </header>

        <div class="grid-layout">
            <div class="card">
                <h3>📷 边缘视觉扫描舱</h3>
                <div class="video-wrapper">
                    <video id="video" autoplay playsinline></video>
                    <div class="roi-box" id="roiBox"></div>
                    <div class="scanner-laser" id="laser"></div>
                </div>
                <canvas id="canvas"></canvas>
                <canvas id="roiCanvas"></canvas>
                
                <div class="result-box">
                    <label>智能提取 SN 序列号</label>
                    <div id="snResult" style="margin-top:4px; font-weight:600; color:#34d399;">引擎未启动</div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" id="camToggleBtn">启动智能扫描</button>
                    <button class="btn btn-secondary" id="confirmSnBtn">确认录入该SN</button>
                </div>
                
                <div class="result-box">
                    <label>结构化目录树清洗区</label>
                    <div id="fileOcrResult" style="margin-top:4px; color: var(--text-muted); font-size:13px; white-space: pre-wrap; max-height: 80px; overflow-y: auto;">暂无捕获内容</div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-secondary" id="ocrFileBtn">抓拍清洗目录树</button>
                    <button class="btn btn-primary" id="appendFileBtn">追加至选中硬盘</button>
                </div>
            </div>

            <div class="card">
                <h3>⚙️ 实体节点快照修改</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                    <div>
                        <label>重命名盘符</label>
                        <input type="text" id="diskNameInput" placeholder="请选择目标盘符">
                    </div>
                    <div>
                        <label>节点状态机</label>
                        <select id="diskStatusSelect">
                            <option value="在线">在线 (Online)</option>
                            <option value="离线">离线 (Offline)</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-primary" id="saveInfoBtn">同步修改到集群</button>

                <hr style="border:0; border-top:1px solid var(--panel-border);">
                <h3>💾 快照序列化导入/导出</h3>
                <input type="file" id="importFile" accept=".txt">
                <div class="btn-group">
                    <button class="btn btn-secondary" id="importDataBtn">导入外部快照</button>
                    <button class="btn btn-secondary" id="exportDataBtn">导出架构快照</button>
                </div>

                <hr style="border:0; border-top:1px solid var(--panel-border);">
                <h3>🧹 极客安全擦除</h3>
                <button class="btn btn-danger" id="clearAllFileBtn">物理清空选中盘虚拟目录树</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Node</th>
                        <th>别名</th>
                        <th>SN 序列号</th>
                        <th>物理介质</th>
                        <th>拓扑容量</th>
                        <th>运行状态</th>
                        <th>虚拟目录树结构</th>
                        <th style="text-align: right;">操作句柄</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="settingModal" class="modal-mask hide">
        <div class="modal-box">
            <h4>🛠️ 物理链路层配置重调</h4>
            <div><label>别名</label><input type="text" id="setDiskName"></div>
            <div><label>硬件 SN</label><input type="text" id="setDiskSn"></div>
            <div><label>接口协议</label>
                <select id="setDiskType">
                    <option value="固态硬盘">企业级固态 (SSD)</option>
                    <option value="机械硬盘">高容量机械 (HDD)</option>
                </select>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                <div><label>总容量 (GB)</label><input type="number" id="setTotalSize"></div>
                <div><label>剩余容量 (GB)</label><input type="number" id="setFreeSize"></div>
            </div>
            <div class="btn-group" style="justify-content: flex-end; margin-top: 8px;">
                <button class="btn btn-secondary" id="cancelSetBtn">回滚</button>
                <button class="btn btn-primary" id="submitSetBtn">下发核准</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const roiCanvas = document.getElementById('roiCanvas');
        const ctx = canvas.getContext('2d');
        const roiCtx = roiCanvas.getContext('2d');
        const roiBox = document.getElementById('roiBox');
        const laser = document.getElementById('laser');
        const snResult = document.getElementById('snResult');
        const fileOcrResult = document.getElementById('fileOcrResult');
        const tableBody = document.getElementById('tableBody');
        const diskNameInput = document.getElementById('diskNameInput');
        const diskStatusSelect = document.getElementById('diskStatusSelect');
        const settingModal = document.getElementById('settingModal');
        const camToggleBtn = document.getElementById('camToggleBtn');

        let mediaStream = null;
        let currentSN = '';
        let currentFileText = '';
        let snHistory = [];
        let selectIndex = -1;
        let settingTargetIndex = -1;
        let diskList = [];
        
        let loopInterval = null;
        let isProcessing = false;
        let barcodeDetector = null;

        // 初始化检查浏览器底层是否内置原生的条码检测器小模型
        if ('BarcodeDetector' in window) {
            // 支持检测常见的硬盘条形码 (code_128) 和二维码 (data_matrix, qr)
            barcodeDetector = new BarcodeDetector({ formats: ['code_128', 'qr', 'data_matrix', 'code_39'] });
        }

        function init() {
            const local = localStorage.getItem('yzCloudDiskData');
            if (local) diskList = JSON.parse(local);
            renderTable();
        }

        async function openCamera() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = mediaStream;
                camToggleBtn.textContent = '停止智能扫描';
                camToggleBtn.classList.replace('btn-primary', 'btn-danger');
                laser.style.display = 'block';
                snHistory = [];
                startSmartLoop();
            } catch (e) {
                alert('摄像头拉取失败，请确保处于 HTTPS 环境或本地 localhost 上运行。');
            }
        }

        function closeCamera() {
            if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
            video.srcObject = null;
            camToggleBtn.textContent = '启动智能扫描';
            camToggleBtn.classList.replace('btn-danger', 'btn-primary');
            laser.style.display = 'none';
            roiBox.classList.remove('roi-active');
            clearInterval(loopInterval);
            loopInterval = null;
        }

        // 核心 AI 轮询链路：条码侦测优先 -> 降级局部 ROI 的 OCR 识别
        function startSmartLoop() {
            if (loopInterval) return;
            loopInterval = setInterval(async () => {
                if (isProcessing || !mediaStream || video.readyState !== video.HAVE_ENOUGH_DATA) return;
                isProcessing = true;

                try {
                    // 1. 硬件级原生条码检测小模型前置拦截
                    if (barcodeDetector) {
                        const barcodes = await barcodeDetector.detect(video);
                        if (barcodes.length > 0) {
                            let detectValue = barcodes[0].rawValue.trim();
                            // 过滤掉纯非数字英文的乱码
                            if (/^[\w\d_-]+$/.test(detectValue)) {
                                currentSN = detectValue;
                                snResult.innerHTML = `✨ [条码小模型捕获] ➔ <span>${currentSN}</span>`;
                                roiBox.classList.add('roi-active');
                                isProcessing = false;
                                return; 
                            }
                        }
                    }

                    // 2. 局部 ROI（感兴趣区域）精确裁剪，规避周围光影和无关字符杂质乱扫
                    const roiImg = captureRoiZone();
                    if (!roiImg) { isProcessing = false; return; }

                    // 3. 将高度干净的局部图像送入 OCR 管道
                    const res = await Tesseract.recognize(roiImg, 'eng', { logger: () => {} });
                    const cleanText = res.data.text;
                    
                    // 4. 精密正则过滤：匹配带 S/N，或者长度大于 5 位的纯硬核数字英文字符串
                    const matchedSn = extractStrictSN(cleanText);
                    if (matchedSn) {
                        currentSN = getStableValue(matchedSn);
                        snResult.innerHTML = `🔍 [视觉矩阵分析] ➔ <span>${currentSN}</span>`;
                        roiBox.classList.add('roi-active');
                    } else {
                        roiBox.classList.remove('roi-active');
                    }
                } catch (err) {
                    console.error("AI Loop Analysis Exception:", err);
                } finally {
                    isProcessing = false;
                }
            }, 1800); // 1.8秒步进，计算负载更轻滑
        }

        // 图像边缘裁剪内核：精准切出聚焦框部分的像素
        function captureRoiZone() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 计算前端聚焦框在真实视频分辨率中的等比映射坐标
            const scaleX = video.videoWidth / video.offsetWidth;
            const scaleY = video.videoHeight / video.offsetHeight;

            // 聚焦框尺寸：280x80
            const roiW = 280 * scaleX;
            const roiH = 80 * scaleY;
            const roiX = (video.videoWidth - roiW) / 2;
            const roiY = (video.videoHeight - roiH) / 2;

            roiCanvas.width = roiW;
            roiCanvas.height = roiH;
            roiCtx.drawImage(canvas, roiX, roiY, roiW, roiH, 0, 0, roiW, roiH);
            return roiCanvas.toDataURL('image/png');
        }

        // 严格型 SN 提取器
        function extractStrictSN(text) {
            // 策略 A: 带有常规 SN 前缀
            const regWithPrefix = /(?:SN|S\/N|SER|Serial)[:：\s]*([\w\d_-]{5,20})/i;
            const match = regWithPrefix.exec(text);
            if (match) return match[1].trim();

            // 策略 B: 无前缀，但中央聚焦框内出现了高置信度的纯机器特征码（5-18位大写英数字组合）
            const words = text.split(/[\s\n]+/);
            for (let word of words) {
                word = word.replace(/[^a-zA-Z0-9_-]/g, ''); // 剔除 OCR 产生的标点噪点
                if (/^[A-Z0-9]{6,16}$/.test(word)) {
                    return word;
                }
            }
            return null;
        }

        // 多频滑窗稳健防抖算法
        function getStableValue(val) {
            snHistory.push(val);
            if (snHistory.length > 3) snHistory.shift();
            // 返回高频重合项
            const counts = {};
            let maxCount = 0;
            let stableVal = val;
            for (const v of snHistory) {
                counts[v] = (counts[v] || 0) + 1;
                if (counts[v] > maxCount) { maxCount = counts[v]; stableVal = v; }
            }
            return stableVal;
        }

        // 智能目录树解析清洗器（专门治理“乱扫”现象）
        document.getElementById('ocrFileBtn').addEventListener('click', async () => {
            if (!mediaStream) { alert('视觉引擎未初始化'); return; }
            fileOcrResult.innerText = '⚙️ AI 语义树重构清洗中...';
            
            // 抓拍整体画面（因为目录文本通常较多，采用全画幅分析）
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            try {
                // 使用中英双语混合包进行多段解析
                const res = await Tesseract.recognize(canvas.toDataURL('image/png'), 'chi_sim+eng');
                const rawText = res.data.text;
                
                // 核心清洗过滤器：逐行扫描，用智能规则杀灭毫无意义的乱码和噪点
                const lines = rawText.split('\n');
                const cleanLines = lines.map(line => line.trim()).filter(line => {
                    // 规则一：剔除包含无意义杂质标点的行
                    if (/^[.`'’"‘\s\-_—:=;!|\\/]+$/.test(line)) return false;
                    // 规则二：保留包含常见文件扩展名、典型路径斜杠、或者包含中文中长词的行
                    const hasFileExtension = /\.(txt|mp4|mov|jpg|png|zip|rar|exe|cfg|bin|mp3|wav|docx|pdf|log)$/i.test(line);
                    const hasPathIndicator = /[\/\\►＞>.\-—]/i.test(line);
                    const hasValidContent = line.length > 2 && /[\u4e00-\u9fa5_a-zA-Z0-9]/.test(line);
                    
                    return hasValidContent && (hasFileExtension || hasPathIndicator || line.length > 4);
                });

                if (cleanLines.length === 0) {
                    currentFileText = '';
                    fileOcrResult.innerText = '⚠️ 经过智能清洗判定：未发现有效的结构化文件或目录行特征，请靠近并对准。';
                } else {
                    currentFileText = cleanLines.join('\n');
                    fileOcrResult.innerText = currentFileText;
                }
            } catch (err) {
                fileOcrResult.innerText = 'AI 解析故障，请重试';
            }
        });

        // ======================= 以下为业务逻辑与台账持久层（保持稳健与高性能） =======================
        function getUsedPercent(t, f) {
            t = Number(t) || 0; f = Number(f) || 0;
            if (t <= 0) return 0;
            return Math.min(Math.max(((t - f) / t) * 100, 0), 100).toFixed(1);
        }

        function renderTable() {
            tableBody.innerHTML = '';
            diskList.forEach((item, idx) => {
                const tr = document.createElement('tr');
                if (idx === selectIndex) tr.classList.add('selected-row');

                let fileHtml = (item.fileList && item.fileList.length > 0) 
                    ? item.fileList.map((f, fIdx) => `<div class="file-item"><span>📄 ${f}</span><button onclick="delSingleFile(${idx},${fIdx})">✕</button></div>`).join('')
                    : '<div style="color:var(--text-muted);font-size:12px;">Empty Tree</div>';

                const percent = getUsedPercent(item.totalSize, item.freeSize);

                tr.innerHTML = `
                    <td style="font-family:monospace; color:var(--text-muted)">#${String(idx+1).padStart(2,'0')}</td>
                    <td style="font-weight:600;">${item.name}</td>
                    <td style="font-family:monospace; color:#60a5fa">${item.sn}</td>
                    <td>${item.type || "固态硬盘"}</td>
                    <td>
                        <div class="progress-wrap"><div class="progress-bar" style="width:${percent}%"></div></div>
                        <small style="color:var(--text-muted); font-size:11px;">${percent}% (${item.totalSize - item.freeSize}/${item.totalSize}G)</small>
                    </td>
                    <td><span style="color:${item.status==='在线'?'#34d399':'#9ca3af'}">${item.status}</span></td>
                    <td class="file-cell">${fileHtml}</td>
                    <td style="text-align:right;">
                        <span style="cursor:pointer; margin-right:10px;" onclick="openSetting(${idx})">⚙️</span>
                        <button class="btn btn-secondary" style="padding:5px 10px; font-size:12px;" onclick="selectDisk(${idx})">选中</button>
                        <button class="btn btn-danger" style="padding:5px 10px; font-size:12px;" onclick="delDisk(${idx})">注销</button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
            localStorage.setItem('yzCloudDiskData', JSON.stringify(diskList));
        }

        camToggleBtn.addEventListener('click', () => { if (mediaStream) closeCamera(); else openCamera(); });

        document.getElementById('confirmSnBtn').addEventListener('click', () => {
            if (!currentSN || currentSN.length < 3) { alert('当前的分析缓冲区未沉淀出有效的 SN 数据，无法录入'); return; }
            diskList.push({
                name: `Node_${currentSN.slice(-4)}`, sn: currentSN, type: "固态硬盘", status: '在线', totalSize: 512, freeSize: 512, fileList: []
            });
            renderTable();
            alert('新实体磁盘挂载入账成功！');
        });

        document.getElementById('appendFileBtn').addEventListener('click', () => {
            if (selectIndex === -1) { alert('操作遭拒绝：请先选中下表台账中的一块目标硬盘'); return; }
            if (!currentFileText) { alert('没有捕获到通过清洗的目录数据行'); return; }
            const lines = currentFileText.split('\n').filter(l => l.length > 0);
            diskList[selectIndex].fileList.push(...lines);
            currentFileText = '';
            fileOcrResult.innerText = '追加落盘成功';
            renderTable();
        });

        window.selectDisk = function(idx) { selectIndex = idx; const item = diskList[idx]; diskNameInput.value = item.name; diskStatusSelect.value = item.status; renderTable(); }
        window.delDisk = function(idx) { if(confirm('确认注销该盘片的所有台账快照？')) { diskList.splice(idx,1); selectIndex=-1; renderTable(); } }
        window.delSingleFile = function(dIdx, fIdx) { diskList[dIdx].fileList.splice(fIdx, 1); renderTable(); }

        document.getElementById('saveInfoBtn').addEventListener('click', () => {
            if (selectIndex === -1) return;
            diskList[selectIndex].name = diskNameInput.value.trim();
            diskList[selectIndex].status = diskStatusSelect.value;
            renderTable();
            alert('配置快照保存成功');
        });

        document.getElementById('clearAllFileBtn').addEventListener('click', () => {
            if (selectIndex === -1) return;
            if (confirm('是否彻底清除此盘的所有文件目录结构树？')) { diskList[selectIndex].fileList = []; renderTable(); }
        });

        // 稳健的数据导入
        document.getElementById('importDataBtn').addEventListener('click', () => {
            const file = document.getElementById('importFile').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                let content = e.target.result.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
                try {
                    const reg = /【序号\d+】\n硬盘名称：(.*?)\nSN编号：(.*?)\n硬盘类型：(.*?)\n总容量\(GB\)：(.*?)\n剩余容量\(GB\)：(.*?)\n运行状态：(.*?)\n文件列表：\n([\s\S]*?)(?=\n------------------------------------|\n$|$)/g;
                    let res; const newList = [];
                    while ((res = reg.exec(content)) !== null) {
                        const fileStr = res[7].trim();
                        newList.push({
                            name: res[1].trim(), sn: res[2].trim(), type: res[3].trim(),
                            totalSize: Number(res[4])||0, freeSize: Number(res[5])||0, status: res[6].trim(),
                            fileList: fileStr === '无' ? [] : fileStr.split('\n').map(s=>s.trim()).filter(s=>s.length>0)
                        });
                    }
                    if(newList.length === 0) throw new Error();
                    diskList = newList; renderTable(); alert('系统总账快照恢复成功');
                } catch(err) { alert('快照文件内部语法不匹配，无法读入'); }
            };
            reader.readAsText(file);
        });

        document.getElementById('exportDataBtn').addEventListener('click', () => {
            let txt = "YZCloud_DISK_SNAPSHOT_SNAPSHOT\n=====================================\n";
            diskList.forEach((item, idx) => {
                txt += `【序号${idx+1}】\n硬盘名称：${item.name}\nSN编号：${item.sn}\n硬盘类型：${item.type}\n总容量(GB)：${item.totalSize}\n剩余容量(GB)：${item.freeSize}\n运行状态：${item.status}\n文件列表：\n`;
                txt += (item.fileList.length > 0 ? item.fileList.join('\n') : "无") + "\n------------------------------------\n";
            });
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([txt], {type:'text/plain;charset=utf-8'}));
            a.download = `YZCloud_Export_${new Date().toISOString().slice(0,10)}.txt`; a.click();
        });

        window.openSetting = function(idx) {
            settingTargetIndex = idx; const item = diskList[idx];
            document.getElementById('setDiskName').value = item.name||''; document.getElementById('setDiskSn').value = item.sn||'';
            document.getElementById('setDiskType').value = item.type||'固态硬盘';
            document.getElementById('setTotalSize').value = item.totalSize||0; document.getElementById('setFreeSize').value = item.freeSize||0;
            settingModal.classList.remove('hide');
        }
        document.getElementById('cancelSetBtn').addEventListener('click', () => settingModal.classList.add('hide'));
        document.getElementById('submitSetBtn').addEventListener('click', () => {
            if(settingTargetIndex === -1) return;
            const item = diskList[settingTargetIndex];
            item.name = document.getElementById('setDiskName').value.trim();
            item.sn = document.getElementById('setDiskSn').value.trim();
            item.type = document.getElementById('setDiskType').value;
            item.totalSize = Number(document.getElementById('setTotalSize').value)||0;
            item.freeSize = Number(document.getElementById('setFreeSize').value)||0;
            settingModal.classList.add('hide'); renderTable();
        });

        window.onload = init;
    </script>
</body>
</html>
