<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>九六快跑</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        /* 全局禁用滚动条 */
        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden !important; /* 强制禁用滚动 */
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0a1a2e 100%);
            -ms-overflow-style: none; /* IE/Edge 隐藏滚动条 */
            scrollbar-width: none; /* Firefox 隐藏滚动条 */
        }

        /* Chrome/Safari 隐藏滚动条 */
        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            display: none !important;
        }

        /* 开屏容器 */
        #splash-screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
            z-index: 1000;
        }

        /* 滚动公告横幅 */
        .notice-bar {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            height: 40px;
            background: rgba(0, 0, 0, 0.7);
            overflow: hidden;
            border-bottom: 1px solid #00f5ff;
            opacity: 0;
            animation: fadeIn 1s ease-out 1s forwards;
        }

        .notice-content {
            position: absolute;
            white-space: nowrap;
            color: #ffd700;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            line-height: 40px;
            left: 100%;
            animation: noticeScroll linear infinite;
            animation-duration: 10s;
        }

        /* 标题动画 */
        .app-title {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: bold;
            background: linear-gradient(45deg, #00f5ff, #7c3aed, #ff0080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(0, 245, 255, 0.6);
            margin-bottom: 1rem;
            opacity: 0;
            transform: translateY(30px);
            animation: titleFade 1s ease-out 0.5s forwards;
            letter-spacing: 3px;
        }

        .version-tag {
            font-size: clamp(1rem, 4vw, 1.5rem);
            color: #00f5ff;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 1s forwards;
        }

        /* 进度条容器 */
        .progress-container {
            width: clamp(200px, 70vw, 400px);
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
            margin: 1rem 0;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.5s forwards;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #00f5ff, #7c3aed);
            width: 0%;
            border-radius: 5px;
            transition: width 0.3s ease;
        }

        /* 加载状态文本 */
        .loading-status {
            font-size: clamp(0.8rem, 3vw, 1rem);
            color: #888;
            margin: 1rem 0;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.5s forwards;
        }

        /* 防沉迷提示 */
        .anti-addiction {
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            color: rgba(255, 255, 255, 0.6);
            padding: 0 20px;
            opacity: 0;
            animation: fadeIn 1s ease-out 2s forwards;
            line-height: 1.5;
        }

        /* 文字广告位 */
        .text-ad {
            position: absolute;
            bottom: 50px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            color: #00f5ff;
            padding: 5px 0;
            background: rgba(0, 0, 0, 0.5);
            margin: 0 20px;
            border-radius: 8px;
            opacity: 0;
            animation: fadeIn 1s ease-out 2.2s forwards;
        }

        /* 作者信息 */
        .author-info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: clamp(0.7rem, 2vw, 0.8rem);
            color: rgba(255, 255, 255, 0.4);
            opacity: 0;
            animation: fadeIn 1s ease-out 2.5s forwards;
        }

        /* 更新提示 */
        .update-tip {
            position: absolute;
            top: 60px;
            right: 20px;
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            color: #ffd700;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.8s forwards;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 10px;
            border-radius: 4px;
        }

        /* 游戏容器（初始隐藏） */
        #game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            z-index: 10;
            overflow: hidden !important; /* 禁用容器滚动 */
        }

        /* 内嵌页面样式：隐藏滚动条但保留滚动功能 */
        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
            overflow: auto !important; /* 保留滚动功能 */
            -ms-overflow-style: none; /* IE/Edge 隐藏滚动条 */
            scrollbar-width: none; /* Firefox 隐藏滚动条 */
        }

        /* Chrome/Safari 隐藏iframe滚动条 */
        #game-frame::-webkit-scrollbar {
            display: none !important;
        }

        /* 动画定义 */
        @keyframes titleFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes noticeScroll {
            0% {
                left: 100%;
            }
            100% {
                left: -100%;
            }
        }

        /* 加载完成后隐藏开屏 */
        .splash-hidden {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        /* 游戏容器显示 */
        .game-visible {
            opacity: 1;
            visibility: visible;
        }

        /* 错误提示样式 */
        .error-tip {
            color: #ff4444;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- 开屏页面 -->
    <div id="splash-screen">
        <!-- 滚动公告横幅 -->
        <div class="notice-bar">
            <div class="notice-content" id="noticeContent">加载公告中...</div>
        </div>
        
        <div class="update-tip">APP自动更新版本</div>
        <h1 class="app-title">九六快跑</h1>
        <div class="version-tag" id="versionTag">加载版本信息中...</div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="loading-status" id="loadingStatus">正在连接服务器...</div>
        
        <div class="anti-addiction">
            抵制不良游戏，拒绝盗版游戏。注意自我保护，谨防受骗上当。<br>
            适度游戏益脑，沉迷游戏伤身。合理安排时间，享受健康生活。
        </div>
        
        <!-- 文字广告位 -->
        <div class="text-ad" id="textAd">加载广告中...</div>
        
        <div class="author-info">作者: 九六李沅臻</div>
    </div>

    <!-- 游戏容器 -->
    <div id="game-container">
        <iframe id="game-frame"></iframe>
    </div>

    <script>
        // 加载状态文本列表
        const loadingStates = [
            "正在连接服务器...",
            "正在验证版本信息...",
            "正在下载游戏资源...",
            "正在校验资源完整性...",
            "正在排队进入游戏...",
            "正在初始化游戏环境...",
            "准备进入游戏..."
        ];

        // 获取DOM元素
        const splashScreen = document.getElementById('splash-screen');
        const progressBar = document.getElementById('progressBar');
        const loadingStatus = document.getElementById('loadingStatus');
        const gameContainer = document.getElementById('game-container');
        const gameFrame = document.getElementById('game-frame');
        const noticeContent = document.getElementById('noticeContent');
        const versionTag = document.getElementById('versionTag');
        const textAd = document.getElementById('textAd');

        // 全局变量
        let loadTimeoutTimer = null;

        // 1. 加载配置数据（统一命名，隐藏链接特征）
        async function loadConfigData(type) {
            const configUrls = {
                notice: 'https://yzbjfpv.top/game/96run/app/source/公告.txt',
                version: 'https://yzbjfpv.top/game/96run/app/source/最新版本.txt',
                ad: 'https://yzbjfpv.top/game/96run/source/文字广告.txt',
                game: 'https://yzbjfpv.top/game/96run/source/内嵌页面链接.txt'
            };

            try {
                const response = await fetch(configUrls[type]);
                if (response.ok) {
                    return (await response.text()).trim() || "";
                } else {
                    throw new Error("配置数据获取失败");
                }
            } catch (error) {
                console.error(`加载${type}配置失败:`, error);
                return "";
            }
        }

        // 2. 加载公告
        async function loadNotice() {
            const content = await loadConfigData('notice');
            if (!splashScreen.classList.contains('splash-hidden')) {
                noticeContent.textContent = content || "暂无公告";
            }
        }

        // 3. 加载版本
        async function loadVersion() {
            const version = await loadConfigData('version');
            if (!splashScreen.classList.contains('splash-hidden')) {
                versionTag.textContent = version || "未知版本";
            }
        }

        // 4. 加载广告
        async function loadTextAd() {
            const adContent = await loadConfigData('ad');
            if (!splashScreen.classList.contains('splash-hidden')) {
                textAd.textContent = adContent || "广告位招商 - 微信号:YGWFK2024";
            }
        }

        // 批量加载所有配置
        async function loadAllConfig() {
            await Promise.all([
                loadNotice(),
                loadVersion(),
                loadTextAd()
            ]);
        }

        // 加载游戏内容（隐藏网页特征，统一称为"游戏内容"）
        async function loadGameContent() {
            // 获取游戏配置
            const gameConfig = await loadConfigData('game');
            if (!gameConfig) {
                loadingStatus.innerHTML = '<span class="error-tip">服务器配置异常！</span> 5秒后重试...';
                setTimeout(() => {
                    loadingStatus.textContent = "正在重新连接服务器...";
                    loadGameContent();
                }, 5000);
                return;
            }

            // 重置状态
            gameFrame.src = "";
            gameContainer.classList.remove('game-visible');
            splashScreen.classList.remove('splash-hidden');

            // 清除旧的超时定时器
            if (loadTimeoutTimer) clearTimeout(loadTimeoutTimer);

            // 设置60秒超时检测（服务器连接超时）
            loadTimeoutTimer = setTimeout(() => {
                loadingStatus.innerHTML = '<span class="error-tip">服务器连接超时！</span> 5秒后重试...';
                progressBar.style.width = "0%";
                
                // 5秒后重试
                setTimeout(() => {
                    loadingStatus.textContent = "正在重新连接服务器...";
                    loadGameContent();
                }, 5000);
            }, 60000);

            // 加载游戏内容
            gameFrame.src = gameConfig;

            // 加载成功回调
            gameFrame.onload = function() {
                clearTimeout(loadTimeoutTimer);
                splashScreen.classList.add('splash-hidden');
                gameContainer.classList.add('game-visible');
                loadingStatus.textContent = "加载完成";
            };

            // 加载失败回调（服务器连接异常）
            gameFrame.onerror = function() {
                clearTimeout(loadTimeoutTimer);
                loadingStatus.innerHTML = '<span class="error-tip">服务器连接异常！</span> 5秒后重试...';
                setTimeout(() => {
                    loadingStatus.textContent = "正在重新连接服务器...";
                    loadGameContent();
                }, 5000);
            };
        }

        // 模拟加载进度
        function simulateLoadingProgress() {
            let progress = 0;
            let stateIndex = 0;
            const progressInterval = setInterval(() => {
                if (splashScreen.classList.contains('splash-hidden')) {
                    clearInterval(progressInterval);
                    return;
                }

                progress += Math.random() * 3;
                if (progress > 100) progress = 100;
                
                progressBar.style.width = `${progress}%`;

                if (stateIndex < loadingStates.length && progress > stateIndex * 15) {
                    loadingStatus.textContent = loadingStates[stateIndex];
                    stateIndex++;
                }

                if (progress === 100) {
                    clearInterval(progressInterval);
                }
            }, 300);
        }

        // 启动加载流程
        async function startLoading() {
            // 首次加载所有配置
            await loadAllConfig();
            
            // 模拟进度条动画
            simulateLoadingProgress();

            // 加载游戏内容
            loadGameContent();

            // 30秒定时刷新配置（永久运行）
            setInterval(() => {
                loadAllConfig();
            }, 30000);
        }

        // 页面加载完成后启动
        window.addEventListener('load', startLoading);
    </script>
</body>
</html>
