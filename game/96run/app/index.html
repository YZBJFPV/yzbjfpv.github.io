<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>九六快跑</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        /* 全局禁用滚动条 */
        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden !important;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0a1a2e 100%);
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            display: none !important;
        }

        /* 开屏容器 */
        #splash-screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
            z-index: 1000;
        }

        /* 滚动公告横幅 - 减速优化 */
        .notice-bar {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            height: 40px;
            background: rgba(0, 0, 0, 0.7);
            overflow: hidden;
            border-bottom: 1px solid #00f5ff;
            opacity: 0;
            animation: fadeIn 1s ease-out 1s forwards;
        }

        .notice-content {
            position: absolute;
            white-space: nowrap;
            color: #ffd700;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            line-height: 40px;
            left: 100%;
            /* 公告滚动减速到20秒一圈 */
            animation: noticeScroll linear infinite;
            animation-duration: 20s;
        }

        /* 标题动画 */
        .app-title {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: bold;
            background: linear-gradient(45deg, #00f5ff, #7c3aed, #ff0080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(0, 245, 255, 0.6);
            margin-bottom: 1rem;
            opacity: 0;
            transform: translateY(30px);
            animation: titleFade 1s ease-out 0.5s forwards;
            letter-spacing: 3px;
        }

        /* 版本/提示文字优化 - 降低突兀感 */
        .version-tag {
            font-size: clamp(1rem, 4vw, 1.5rem);
            color: rgba(0, 245, 255, 0.8);
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 1s forwards;
            text-shadow: 0 0 10px rgba(0, 245, 255, 0.3);
            cursor: pointer; /* 鼠标悬浮显示手型 */
            transition: all 0.2s ease;
        }

        .version-tag:hover {
            color: rgba(0, 245, 255, 1); /* 悬浮高亮 */
            text-shadow: 0 0 15px rgba(0, 245, 255, 0.5);
        }

        .loading-status {
            font-size: clamp(0.8rem, 3vw, 1rem);
            color: rgba(255, 255, 255, 0.6);
            margin: 1rem 0;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.5s forwards;
        }

        .anti-addiction {
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            color: rgba(255, 255, 255, 0.5);
            padding: 0 20px;
            opacity: 0;
            animation: fadeIn 1s ease-out 2s forwards;
            line-height: 1.5;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .text-ad {
            position: absolute;
            bottom: 50px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            color: rgba(0, 245, 255, 0.8);
            padding: 5px 0;
            background: rgba(0, 0, 0, 0.3);
            margin: 0 20px;
            border-radius: 8px;
            opacity: 0;
            animation: fadeIn 1s ease-out 2.2s forwards;
            backdrop-filter: blur(5px);
        }

        .author-info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: clamp(0.7rem, 2vw, 0.8rem);
            color: rgba(255, 255, 255, 0.3);
            opacity: 0;
            animation: fadeIn 1s ease-out 2.5s forwards;
        }

        .update-tip {
            position: absolute;
            top: 60px;
            right: 20px;
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            color: rgba(255, 215, 0, 0.8);
            opacity: 0;
            animation: fadeIn 1s ease-out 1.8s forwards;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px 10px;
            border-radius: 4px;
            backdrop-filter: blur(5px);
        }

        /* 进度条容器 */
        .progress-container {
            width: clamp(200px, 70vw, 400px);
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
            margin: 1rem 0;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.5s forwards;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #00f5ff, #7c3aed);
            width: 0%;
            border-radius: 5px;
            transition: width 0.3s ease;
        }

        /* 游戏容器 */
        #game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            z-index: 10;
            overflow: hidden !important;
        }

        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
            overflow: auto !important;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        #game-frame::-webkit-scrollbar {
            display: none !important;
        }

        /* 动画定义 */
        @keyframes titleFade {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 公告滚动动画 - 减速 */
        @keyframes noticeScroll {
            0% { left: 100%; }
            100% { left: -100%; }
        }

        .splash-hidden {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .game-visible {
            opacity: 1;
            visibility: visible;
        }

        .error-tip {
            color: #ff4444;
            font-weight: bold;
        }

        /* 返回按钮 - 优化样式 */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 45px;
            height: 45px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00f5ff;
            font-size: 20px;
            cursor: pointer;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 245, 255, 0.4);
            backdrop-filter: blur(5px);
        }

        .back-btn.visible {
            opacity: 1;
            visibility: visible;
        }

        .back-btn:hover {
            background: rgba(0, 245, 255, 0.2);
            color: white;
        }
    </style>
</head>
<body>
    <!-- 返回按钮 -->
    <div class="back-btn" id="backBtn" onclick="goBackToGame()">←</div>

    <!-- 开屏页面 -->
    <div id="splash-screen">
        <div class="notice-bar">
            <div class="notice-content" id="noticeContent">加载公告中...</div>
        </div>
        
        <div class="update-tip">APP自动更新版本</div>
        <h1 class="app-title">九六快跑</h1>
        <div class="version-tag" id="versionTag">加载版本信息中...</div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="loading-status" id="loadingStatus">正在连接服务器...</div>
        
        <div class="anti-addiction">
            抵制不良游戏，拒绝盗版游戏。注意自我保护，谨防受骗上当。<br>
            适度游戏益脑，沉迷游戏伤身。合理安排时间，享受健康生活。
        </div>
        
        <div class="text-ad" id="textAd">加载广告中...</div>
        
        <div class="author-info">作者: 九六李沅臻</div>
    </div>

    <!-- 游戏容器 -->
    <div id="game-container">
        <iframe id="game-frame"></iframe>
    </div>

    <script>
        // 加载状态文本列表
        const loadingStates = [
            "正在连接服务器...",
            "正在验证版本信息...",
            "正在下载游戏资源...",
            "正在校验资源完整性...",
            "正在排队进入游戏...",
            "正在初始化游戏环境...",
            "准备进入游戏..."
        ];

        // DOM元素
        const splashScreen = document.getElementById('splash-screen');
        const progressBar = document.getElementById('progressBar');
        const loadingStatus = document.getElementById('loadingStatus');
        const gameContainer = document.getElementById('game-container');
        const gameFrame = document.getElementById('game-frame');
        const noticeContent = document.getElementById('noticeContent');
        const versionTag = document.getElementById('versionTag');
        const textAd = document.getElementById('textAd');
        const backBtn = document.getElementById('backBtn');

        // 后台触发相关（版本号点击）
        let versionClickCount = 0; // 版本号点击计数
        let versionClickTimer = null; // 点击计时
        const CLICK_TARGET = 8; // 需要点击8次
        const CLICK_TIMEOUT = 15000; // 15秒超时
        const adminUrl = 'https://yzbjfpv.top/game/96run/app/admin';
        let originalGameUrl = '';

        // 全局变量 - 超时时间配置
        let loadTimeoutTimer = null;      // 80秒提示超时定时器
        let realRefreshTimer = null;     // 200秒真正刷新定时器
        const TIP_TIMEOUT = 80000;       // 80秒后显示重试提示
        const REAL_REFRESH_TIMEOUT = 200000; // 200秒才真正刷新内嵌页面
        const RETRY_DELAY = 5000;        // 提示后5秒重试

        // 1. 加载配置数据
        async function loadConfigData(type) {
            const configUrls = {
                notice: 'https://yzbjfpv.top/game/96run/app/source/公告.txt',
                version: 'https://yzbjfpv.top/game/96run/app/source/最新版本.txt',
                ad: 'https://yzbjfpv.top/game/96run/source/文字广告.txt',
                game: 'https://yzbjfpv.top/game/96run/source/内嵌页面链接.txt'
            };

            try {
                const response = await fetch(configUrls[type]);
                if (response.ok) {
                    return (await response.text()).trim() || "";
                } else {
                    throw new Error("配置数据获取失败");
                }
            } catch (error) {
                console.error(`加载${type}配置失败:`, error);
                return "";
            }
        }

        // 2. 加载公告/版本/广告
        async function loadNotice() {
            const content = await loadConfigData('notice');
            if (!splashScreen.classList.contains('splash-hidden')) {
                noticeContent.textContent = content || "暂无公告";
            }
        }

        async function loadVersion() {
            const version = await loadConfigData('version');
            if (!splashScreen.classList.contains('splash-hidden')) {
                versionTag.textContent = version || "未知版本";
            }
        }

        async function loadTextAd() {
            const adContent = await loadConfigData('ad');
            if (!splashScreen.classList.contains('splash-hidden')) {
                textAd.textContent = adContent || "广告位招商 - 微信号:YGWFK2024";
            }
        }

        async function loadAllConfig() {
            await Promise.all([loadNotice(), loadVersion(), loadTextAd()]);
        }

        // 3. 加载游戏内容 - 80秒提示/200秒真正刷新
        async function loadGameContent() {
            const gameConfig = await loadConfigData('game');
            originalGameUrl = gameConfig; // 保存原始游戏链接

            // 清除所有旧定时器
            if (loadTimeoutTimer) clearTimeout(loadTimeoutTimer);
            if (realRefreshTimer) clearTimeout(realRefreshTimer);

            if (!gameConfig) {
                // 配置获取失败：80秒提示，200秒真正刷新
                loadTimeoutTimer = setTimeout(() => {
                    loadingStatus.innerHTML = `<span class="error-tip">服务器配置异常！</span> ${RETRY_DELAY/1000}秒后重试...`;
                    
                    // 200秒才真正刷新
                    realRefreshTimer = setTimeout(() => {
                        loadingStatus.textContent = "正在重新加载游戏页面...";
                        loadGameContent(); // 真正刷新内嵌页面
                    }, REAL_REFRESH_TIMEOUT - TIP_TIMEOUT);

                    // 5秒后仅更新提示文字，不刷新
                    setTimeout(() => {
                        loadingStatus.textContent = "正在重新连接服务器...";
                    }, RETRY_DELAY);
                }, TIP_TIMEOUT);
                return;
            }

            // 重置状态
            gameFrame.src = "";
            gameContainer.classList.remove('game-visible');
            splashScreen.classList.remove('splash-hidden');
            backBtn.classList.remove('visible');

            // 80秒后显示超时提示（仅提示，不刷新）
            loadTimeoutTimer = setTimeout(() => {
                loadingStatus.innerHTML = `<span class="error-tip">服务器连接超时！</span> ${RETRY_DELAY/1000}秒后重试...`;
                progressBar.style.width = "0%";
                
                // 200秒才真正刷新内嵌页面
                realRefreshTimer = setTimeout(() => {
                    loadingStatus.textContent = "正在重新加载游戏页面...";
                    gameFrame.src = gameConfig; // 真正刷新内嵌页面
                }, REAL_REFRESH_TIMEOUT - TIP_TIMEOUT);

                // 5秒后仅更新提示文字，不刷新
                setTimeout(() => {
                    loadingStatus.textContent = "正在重新连接服务器...";
                }, RETRY_DELAY);
            }, TIP_TIMEOUT);

            // 200秒真正刷新的兜底（防止onload/onerror未触发）
            realRefreshTimer = setTimeout(() => {
                if (!gameContainer.classList.contains('game-visible')) {
                    loadingStatus.textContent = "加载超时，正在重新加载游戏...";
                    gameFrame.src = gameConfig; // 真正刷新
                }
            }, REAL_REFRESH_TIMEOUT);

            // 加载游戏
            gameFrame.src = gameConfig;

            // 加载成功回调
            gameFrame.onload = function() {
                // 清除所有定时器
                clearTimeout(loadTimeoutTimer);
                clearTimeout(realRefreshTimer);
                
                splashScreen.classList.add('splash-hidden');
                gameContainer.classList.add('game-visible');
                loadingStatus.textContent = "加载完成";
            };

            // 加载失败回调
            gameFrame.onerror = function() {
                // 清除旧定时器
                clearTimeout(loadTimeoutTimer);
                clearTimeout(realRefreshTimer);

                // 80秒显示提示，200秒真正刷新
                loadTimeoutTimer = setTimeout(() => {
                    loadingStatus.innerHTML = `<span class="error-tip">服务器连接异常！</span> ${RETRY_DELAY/1000}秒后重试...`;
                    
                    // 200秒真正刷新
                    realRefreshTimer = setTimeout(() => {
                        loadingStatus.textContent = "正在重新加载游戏页面...";
                        gameFrame.src = gameConfig; // 真正刷新
                    }, REAL_REFRESH_TIMEOUT - TIP_TIMEOUT);

                    // 5秒后仅更新提示文字
                    setTimeout(() => {
                        loadingStatus.textContent = "正在重新连接服务器...";
                    }, RETRY_DELAY);
                }, TIP_TIMEOUT);
            };
        }

        // 4. 模拟加载进度
        function simulateLoadingProgress() {
            let progress = 0;
            let stateIndex = 0;
            const progressInterval = setInterval(() => {
                if (splashScreen.classList.contains('splash-hidden')) {
                    clearInterval(progressInterval);
                    return;
                }

                progress += Math.random() * 1.5; // 减慢进度增长速度
                if (progress > 100) progress = 100;
                
                progressBar.style.width = `${progress}%`;

                if (stateIndex < loadingStates.length && progress > stateIndex * 15) {
                    loadingStatus.textContent = loadingStates[stateIndex];
                    stateIndex++;
                }

                if (progress === 100) {
                    clearInterval(progressInterval);
                }
            }, 500); // 延长进度更新间隔，更平缓
        }

        // 5. 版本号点击触发后台逻辑（无提示）
        function bindVersionClickTrigger() {
            versionTag.addEventListener('click', () => {
                // 初始化计时器（15秒超时重置）
                if (versionClickCount === 0) {
                    versionClickTimer = setTimeout(() => {
                        versionClickCount = 0; // 超时重置计数，无提示
                    }, CLICK_TIMEOUT);
                }

                // 增加计数
                versionClickCount++;
                
                // 检查是否达到目标次数
                if (versionClickCount >= CLICK_TARGET) {
                    clearTimeout(versionClickTimer); // 清除计时器
                    versionClickCount = 0; // 重置计数
                    
                    // 切换到后台管理页面（无提示）
                    gameFrame.src = adminUrl;
                    // 显示返回按钮
                    backBtn.classList.add('visible');
                    // 如果开屏页还在显示，隐藏它
                    splashScreen.classList.add('splash-hidden');
                    gameContainer.classList.add('game-visible');
                }
            });
        }

        // 6. 返回游戏页面
        function goBackToGame() {
            backBtn.classList.remove('visible');
            loadGameContent(); // 重新加载原游戏
        }

        // 启动流程
        async function startLoading() {
            await loadAllConfig();
            simulateLoadingProgress();
            loadGameContent();
            bindVersionClickTrigger(); // 绑定版本号点击触发

            // 30秒刷新配置
            setInterval(() => {
                loadAllConfig();
            }, 30000);
        }

        window.addEventListener('load', startLoading);
    </script>
</body>
</html>
