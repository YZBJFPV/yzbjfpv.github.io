<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九六快跑 - 兑换码生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background: #0a0a1a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #00f5ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .form-group {
            margin: 15px 0;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
        }
        
        input {
            width: 100%;
            padding: 10px;
            background: #222;
            border: 2px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }
        
        button {
            background: linear-gradient(45deg, #00f5ff, #7c3aed);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            transition: transform 0.3s;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #222;
            border-radius: 8px;
            word-break: break-all;
        }
        
        .result-title {
            color: #00f5ff;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .expire-tip {
            color: #ff4444;
            font-size: 0.8rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>兑换码生成器</h1>
        
        <div class="form-group">
            <label for="diamondCount">钻石数量</label>
            <input type="number" id="diamondCount" min="1" max="9999" value="100" placeholder="输入钻石数量">
        </div>
        
        <button onclick="generateCode()">生成兑换码</button>
        
        <div class="result" id="resultArea" style="display: none;">
            <div class="result-title">生成的兑换码：</div>
            <div id="codeResult"></div>
            <div class="expire-tip">⚠️ 该兑换码1分钟内有效，且只能使用一次</div>
        </div>
    </div>

    <script>
        // 生成兑换码（前端简易加密）
        function generateCode() {
            const diamondCount = parseInt(document.getElementById('diamondCount').value);
            
            if (isNaN(diamondCount) || diamondCount < 1 || diamondCount > 9999) {
                alert('请输入1-9999之间的钻石数量！');
                return;
            }
            
            // 1分钟有效期
            const expireTime = Date.now() + 60 * 1000;
            // 拼接数据
            const rawData = `${diamondCount}|${expireTime}`;
            // Base64加密（简易）
            const code = btoa(rawData);
            
            // 显示结果
            document.getElementById('codeResult').textContent = code;
            document.getElementById('resultArea').style.display = 'block';
        }
    </script>
</body>
</html>
