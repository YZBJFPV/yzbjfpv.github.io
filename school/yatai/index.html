<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亚太九六毕业纪念站 - 搭建中</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-weight: bold;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            /* 粉蓝渐变固定背景 */
            background: linear-gradient(135deg, #ffb6e0, #80bfff);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            font-size: clamp(28px, 8vw, 48px);
            margin-bottom: 30px;
        }
        .desc {
            font-size: clamp(16px, 4vw, 22px);
            line-height: 2;
            margin-bottom: 25px;
        }
        .time {
            font-size: clamp(18px, 5vw, 26px);
            color: #fffef0;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>毕业纪念网站 正在搭建中</h1>
        <div class="desc">
            网站功能预告：<br>
            可共享个人联系方式（支持隐藏设置）、专属管理后台<br>
            支持照片上传分享<br>
            全屏弹幕公屏喊话、公共聊天区、好友私人私聊
        </div>
        <div class="time">
            预计正式上线时间：2026年06月20日
        </div>
    </div>
</body>
</html>
