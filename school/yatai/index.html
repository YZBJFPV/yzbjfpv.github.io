<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>九六毕业纪念册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            min-height: 100vh;
            /* 粉蓝渐变背景 */
            background: linear-gradient(135deg, #FFA8D8, #82C9FF);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            text-align: center;
            padding: 24px;
        }
        .title {
            font-size: clamp(2rem, 8vw, 3.2rem);
            white-space: nowrap;
            margin-bottom: 24px;
            font-weight: 600;
        }
        .loading-tip {
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            margin-bottom: 40px;
        }
        .error-box {
            display: none;
        }
        .error-text {
            color: #ff2e2e;
            font-size: clamp(1.2rem, 4.5vw, 1.6rem);
            margin-bottom: 22px;
        }
        .jump-btn {
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            padding: 14px 36px;
            border: none;
            border-radius: 999px;
            background-color: #ffffff;
            color: #4477cc;
            cursor: pointer;
            transition: 0.2s ease;
        }
        .jump-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>
    <div class="title">欢迎访问九六毕业纪念册</div>
    <div class="loading-tip">正在连接 YZ Cloud 服务器...</div>

    <div class="error-box">
        <div class="error-text">跳转失败？</div>
        <button class="jump-btn" onclick="goJump()">点我跳转</button>
    </div>

    <script>
        const target = "http://123.56.106.49:8888/school/yatai/public/index.html";
        // 页面载入后等待1秒执行跳转
        setTimeout(() => {
            window.location.href = target;
            // 跳转触发后立刻显示失败区域
            document.querySelector('.loading-tip').style.display = 'none';
            document.querySelector('.error-box').style.display = 'block';
        }, 1000);

        function goJump() {
            window.location.href = target;
        }
    </script>
</body>
</html>
