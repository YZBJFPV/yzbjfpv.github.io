<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>亚太牛福｜Dzh作业写不完了｜我去不早说｜恩师网依云｜开学啦</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}

#flash{
  position:fixed;
  top:0;left:0;
  width:100vw;height:100vh;
  z-index:10;
  background:#000;
}

#bg{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:11;
  opacity:0.5;
  pointer-events:none;
}

.container{
  position:fixed;z-index:20;
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:#fff;text-align:center;
  pointer-events:none;
}

.title{
  font-size:42px;
  color:#0ff;
  text-shadow:0 0 20px #0ff,0 0 50px #0ff;
  margin-bottom:30px;
}

.flip-clock{
  display:flex;gap:16px;
  perspective:1000px;
}
.digit-box{
  width:80px;height:110px;
  position:relative;
  transform-style:preserve-3d;
}
.digit{
  position:absolute;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  border:2px solid #0ff;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:64px;font-weight:bold;
  color:#ff3c57;
  text-shadow:0 0 20px #ff3c57;
  backface-visibility:hidden;
}
.colon{
  font-size:68px;
  color:#0ff;
  text-shadow:0 0 25px #0ff;
  display:flex;align-items:center;
}

.label{margin-top:20px;font-size:18px;color:#ccc}

.danmu{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:15;
}
.danmu-item{
  position:absolute;
  white-space:nowrap;
  font-size:24px;
  color:#fff;
  text-shadow:0 0 6px #000;
  animation:danmuFly 5.5s cubic-bezier(0,0.6,0.6,1) forwards;
}
@keyframes danmuFly{
  0%{transform:translateX(110vw)}
  40%{transform:translateX(40vw)}
  60%{transform:translateX(30vw)}
  100%{transform:translateX(-120%)}
}
</style>
</head>
<body>

<div id="flash"></div>
<div id="bg"></div>
<div class="danmu" id="danmu"></div>

<div class="container">
  <div class="title">2026 开学早读倒计时</div>
  <div class="flip-clock">
    <div class="digit-box"><div class="digit" id="h0">0</div></div>
    <div class="digit-box"><div class="digit" id="h1">0</div></div>
    <div class="colon">:</div>
    <div class="digit-box"><div class="digit" id="m0">0</div></div>
    <div class="digit-box"><div class="digit" id="m1">0</div></div>
    <div class="colon">:</div>
    <div class="digit-box"><div class="digit" id="s0">0</div></div>
    <div class="digit-box"><div class="digit" id="s1">0</div></div>
  </div>
  <div class="label">目标时间：2026年3月2日 上午 07:30</div>
</div>

<script>
// --------------------------
// 60帧 全屏彩色爆闪（超级亮）
// --------------------------
let hue = 0;
function flashColor() {
  hue = (hue + 12) % 360;
  $('#flash').css('background', `hsl(${hue}, 100%, 50%)`);
}
setInterval(flashColor, 1000/60);

// --------------------------
// 高速星空
// --------------------------
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);
document.getElementById("bg").appendChild(renderer.domElement);

const geo = new THREE.BufferGeometry();
const mat = new THREE.PointsMaterial({
  color:0xffffff, size:0.3, transparent:true, opacity:1
});
const verts = [];
for(let i=0;i<4000;i++){
  verts.push((Math.random()-0.5)*200,(Math.random()-0.5)*200,(Math.random()-0.5)*200);
}
geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
const points = new THREE.Points(geo,mat);
scene.add(points);

function animateBg(){
  requestAnimationFrame(animateBg);
  points.rotation.y += 0.005;
  points.rotation.x += 0.0025;
  renderer.render(scene,camera);
}
animateBg();

// --------------------------
// 每秒滴一声
// --------------------------
function beep(){
  const a = new AudioContext();
  const o = a.createOscillator();
  const g = a.createGain();
  o.connect(g); g.connect(a.destination);
  o.frequency.value = 950;
  o.type = 'sine';
  g.gain.value = 0.25;
  o.start();
  o.stop(a.currentTime+0.07);
}

// --------------------------
// 弹窗
// --------------------------
const msgList = [
  "你作业写了吗？",
  "你完了吧！",
  "还敢玩？",
  "早读要迟到了！",
  "作业一堆没写！",
  "老师要骂你了！"
];
function crazyAlert(){
  alert(msgList[Math.floor(Math.random()*msgList.length)]);
}
setInterval(crazyAlert, 3000);

// --------------------------
// 3D滚动数字
// --------------------------
const target = new Date("2026-03-02T07:30:00+08:00");
function pad2(n){return n<10?'0'+n:''+n}
function setDigit(id,val){
  const el = document.getElementById(id);
  if(el.innerText != val){
    el.innerText = val;
    el.animate([
      {transform:'rotateX(0deg)'},
      {transform:'rotateX(-360deg)'}
    ],{duration:200,easing:'ease-out'});
  }
}

let lastSec = -1;
function updateClock(){
  const diff = Math.max(0, target - new Date());
  const hh = pad2(Math.floor(diff/3600000));
  const mm = pad2(Math.floor((diff%3600000)/60000));
  const ss = pad2(Math.floor((diff%60000)/1000));

  setDigit('h0',hh[0]); setDigit('h1',hh[1]);
  setDigit('m0',mm[0]); setDigit('m1',mm[1]);
  setDigit('s0',ss[0]); setDigit('s1',ss[1]);

  const sec = parseInt(ss);
  if(sec !== lastSec){ beep(); lastSec = sec; }
}
setInterval(updateClock, 100);
updateClock();

// --------------------------
// 弹幕
// --------------------------
const texts = [
"我作业还没写，完蛋了！","作业是什么？我忘了…",
"我靠英语怎么还有作业？","我靠数学还有作业？","我靠历史还有作业？",
"这作业怎么这么多呀！","求学校明天倒塌",
"谁懂啊，一开学就焦虑","真的不想早起啊","七点半早读要人命",
"昨晚熬到三点还没写完","谁发明的早读啊","能不能直接跳过早读",
"我真的会谢","脑子还在放假","眼睛睁不开了","谁爱去谁去吧",
"我还能再睡十分钟吗","早读根本记不住东西","困到灵魂出窍",
"书包还没收拾","笔都找不到了","课本落家里了","开学即渡劫",
"主打一个临时抱佛脚","谁能救救我","真的要崩溃了",
"为什么要有早读这种东西","我恨早起","灵魂还在床上",
"能不能请假啊","再给我一天补作业","真的写不完了",
"破防了家人们","开学恐惧症犯了","谁发明的开学啊",
"我想回家睡觉","早读纯纯折磨人","已经开始困了",
"脑子一片空白","作业多到想原地去世","谁懂补作业的痛",
"越补越绝望","干脆不交作业了","老师别查我作业",
"我真的没写完","救命啊作业成堆","谁来替我上学",
"早读能不能取消","我真的起不来","困到怀疑人生",
"开学第一天就想死","谁要早读我不说","已经预见被骂了",
"补作业补到麻木","心态崩了呀","我想继续放假",
"真的顶不住了","谁来安慰我一下","早读前的绝望谁懂",
"绝望到麻木","谁来把作业吃了","我人已经傻了",
"别叫我我已阵亡","谁愿意替我早读","我真的一滴都没有了",
"开学前的绝望谁懂","已经在祈祷停电","希望闹钟坏掉",
"=","=","=","=","="
];

const usedTops = [];
const lines = 18;
const lineH = 100/lines;

function getTop(){
  let top;
  do{top = Math.floor(Math.random()*lines)*lineH+3}while(usedTops.includes(top));
  usedTops.push(top);
  if(usedTops.length>12) usedTops.shift();
  return top+'%';
}

function spawnDanmu(){
  const item = document.createElement('div');
  item.className = "danmu-item";
  item.innerText = texts[Math.floor(Math.random()*texts.length)];
  item.style.top = getTop();
  item.style.animationDuration = (Math.random()*1 + 5) + 's';
  document.getElementById('danmu').appendChild(item);
  setTimeout(()=>item.remove(), 6000);
}
setInterval(spawnDanmu, 200);
</script>
</body>
</html>
