<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>怀念杜江官方网站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 更有深度的径向渐变背景 */
            background: radial-gradient(circle at top, #162032, #050710);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #fff;
            overflow: hidden;
        }
        .card {
            background: rgba(18, 24, 40, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 198, 255, 0.1);
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            /* 卡片入场动效：丝滑上浮并淡入 */
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
            min-width: 480px;
        }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        
        h1 {
            font-size: 32px;
            letter-spacing: 8px;
            background: linear-gradient(90deg, #38bdf8, #a78bfa, #38bdf8);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* 标题流光加速，适应1.5秒短停留 */
            animation: flow 1.5s linear infinite;
            margin-bottom: 24px;
        }
        @keyframes flow { to { background-position: 200% center; } }
        
        .info { color: #94a3b8; font-size: 14px; line-height: 1.8; letter-spacing: 1px; }
        .domain { color: #38bdf8; margin: 0 5px; font-weight: bold; }
        
        .status {
            margin: 30px 0 20px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(56, 189, 248, 0.05);
            border: 1px solid rgba(56, 189, 248, 0.15);
        }
        .status p { color: #cbd5e1; font-size: 14px; margin-bottom: 4px; }
        .status small { color: #64748b; font-size: 12px; }
        
        .v { font-size: 12px; color: #475569; margin-bottom: 20px; }
        
        .track { height: 4px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
        .bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #38bdf8, #a78bfa);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.8);
            /* 进度条严格执行1.5秒动画 */
            animation: load 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes load { to { width: 100%; } }
    </style>
</head>
<body>
    <div class="card">
        <h1>怀念杜江官网</h1>
        <div class="info">
            制作：九年级六班 李沅臻 &nbsp;|&nbsp; 技术：Flyz远征飞<br>
            <span class="domain">917813.com.cn</span> • <span class="domain">yzbjfpv.top</span>
        </div>
        <div class="status">
            <p>⚡ 正在连接 Flyz远征飞 超高速节点</p>
            <small>显示 IP 地址属正常现象</small>
        </div>
        <div class="v">版本信息：20260426-V1.0.6</div>
        <div class="track"><div class="bar"></div></div>
    </div>

    <script>
        // 严格 1.5 秒（1500毫秒）后跳转，与进度条动画时间完全同步
        setTimeout(() => {
            location.replace("http://123.56.106.49:6666/dj/");
        }, 1500);
    </script>
</body>
</html>
