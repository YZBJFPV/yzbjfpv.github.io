<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YZWeather EliteAPP</title>
    <script src="https://cdn.staticfile.org/three.js/r128/three.min.js"></script>
    <script src="https://cdn.staticfile.org/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .glass-ui { 
            position: relative; z-index: 10; 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .text-gradient {
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.4) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <nav class="relative z-10 p-10 flex justify-between items-start">
        <div>
            <h1 class="text-xs uppercase tracking-[0.4em] opacity-40 mb-1">YZWeather</h1>
            <p id="location" class="text-xl font-light tracking-tight">Detecting Location...</p>
        </div>
        <div class="text-right">
            <p id="time-ago" class="text-[10px] font-mono opacity-30 italic uppercase">Syncing...</p>
            <button onclick="updateWeather()" class="mt-2 opacity-20 hover:opacity-100 transition-opacity">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
        </div>
    </nav>

    <main class="relative z-10 flex flex-col items-center justify-center h-[50vh]">
        <div class="text-center">
            <div id="temp" class="text-[160px] font-thin leading-none tracking-tighter text-gradient">--</div>
            <p id="condition" class="text-sm tracking-[0.8em] uppercase opacity-40 -mt-2">Scanning Environment</p>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 w-full z-10 p-8">
        <div class="max-w-4xl mx-auto grid grid-cols-3 gap-1 px-4 py-8 rounded-[40px] glass-ui">
            <div class="text-center">
                <p class="text-[9px] opacity-30 uppercase tracking-widest mb-2">Humidity</p>
                <p id="humid-val" class="text-xl font-light">--%</p>
            </div>
            <div class="text-center border-x border-white/5">
                <p class="text-[9px] opacity-30 uppercase tracking-widest mb-2">Wind Speed</p>
                <p id="wind-val" class="text-xl font-light">--<span class="text-[10px] ml-1">km/h</span></p>
            </div>
            <div class="text-center">
                <p class="text-[9px] opacity-30 uppercase tracking-widest mb-2">UV Index</p>
                <p id="uv-val" class="text-xl font-light">--</p>
            </div>
        </div>
        <div class="mt-8 text-center text-[10px] opacity-20 tracking-[0.3em] uppercase">
            Technology by <span class="font-bold">Flyz远征飞</span>
        </div>
    </footer>

    <script>
        // --- 1. Three.js 极简 3D 渲染 ---
        let scene, camera, renderer, sphere, light, light2;
        let lastFetchTime = Date.now();

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 几何体：柔和的球体
            const geometry = new THREE.IcosahedronGeometry(2, 64);
            const material = new THREE.MeshPhysicalMaterial({
                color: 0xffffff,
                roughness: 0.1,
                metalness: 0.2,
                transmission: 0.5,
                thickness: 1.5,
                transparent: true,
                wireframe: false
            });
            sphere = new THREE.Mesh(geometry, material);
            scene.add(sphere);

            // 光影：高级感的关键
            light = new THREE.PointLight(0x0066ff, 15, 10);
            light.position.set(5, 5, 5);
            scene.add(light);

            light2 = new THREE.PointLight(0xff0066, 10, 10);
            light2.position.set(-5, -5, 2);
            scene.add(light2);

            scene.add(new THREE.AmbientLight(0x404040, 2));
            camera.position.z = 6;

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            // 球体轻微波动
            sphere.rotation.y += 0.005;
            sphere.rotation.x += 0.002;
            
            // 顶点跳动模拟“气流”
            const positionAttribute = sphere.geometry.getAttribute('position');
            for (let i = 0; i < positionAttribute.count; i++) {
                const vertex = new THREE.Vector3();
                vertex.fromBufferAttribute(positionAttribute, i);
                const wave = Math.sin(vertex.x + time) * 0.05;
                vertex.normalize().multiplyScalar(2 + wave);
                positionAttribute.setXYZ(i, vertex.x, vertex.y, vertex.z);
            }
            positionAttribute.needsUpdate = true;

            // 更新时间显示
            const diff = Math.floor((Date.now() - lastFetchTime) / 1000);
            document.getElementById('time-ago').innerText = `${diff}S AGO`;

            renderer.render(scene, camera);
        }

        // --- 2. 陀螺仪光影同步 ---
        window.addEventListener('deviceorientation', (e) => {
            if (e.beta) {
                const x = e.gamma / 10;
                const y = e.beta / 10;
                gsap.to(light.position, { x: x, y: -y, duration: 1 });
                gsap.to(sphere.rotation, { z: x * 0.1, duration: 1 });
            }
        });

        // --- 3. 数据与定位逻辑 ---
        async function updateWeather() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                document.getElementById('location').innerText = `LAT: ${latitude.toFixed(2)} LON: ${longitude.toFixed(2)}`;
                
                try {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,uv_index&timezone=auto`);
                    const data = await res.json();
                    refreshUI(data.current);
                } catch (err) {
                    console.error("Fetch Error");
                }
            });
        }

        function refreshUI(current) {
            lastFetchTime = Date.now();
            
            // 数值平滑滚动
            const targetData = {
                temp: current.temperature_2m,
                humid: current.relative_humidity_2m,
                wind: current.wind_speed_10m,
                uv: current.uv_index
            };

            gsap.to("#temp", {
                innerText: Math.round(targetData.temp),
                duration: 2,
                snap: { innerText: 1 }
            });

            document.getElementById('humid-val').innerText = `${Math.round(targetData.humid)}%`;
            document.getElementById('wind-val').innerHTML = `${targetData.wind.toFixed(1)}<span class="text-[10px] ml-1">km/h</span>`;
            document.getElementById('uv-val').innerText = targetData.uv.toFixed(1);

            // 3D 颜色根据气温自然转换
            let themeColor = 0x00f3ff; // 冷色
            if (targetData.temp > 25) themeColor = 0xffa500; // 暖色
            if (targetData.temp > 32) themeColor = 0xff4500; // 酷热

            gsap.to(light.color, {
                r: new THREE.Color(themeColor).r,
                g: new THREE.Color(themeColor).g,
                b: new THREE.Color(themeColor).b,
                duration: 3
            });
            
            const weatherMap = {0: "Clear", 1: "Mainly Clear", 2: "Partly Cloudy", 3: "Overcast"};
            document.getElementById('condition').innerText = weatherMap[current.weather_code] || "Unsettled";
        }

        // --- 4. 初始化 ---
        init3D();
        updateWeather();
        setInterval(updateWeather, 30000); // 30秒自动刷新

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
