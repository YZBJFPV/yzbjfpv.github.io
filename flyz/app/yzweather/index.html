<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YZWeather Elite - Pro</title>
    <script src="https://cdn.staticfile.org/three.js/r128/three.min.js"></script>
    <script src="https://cdn.staticfile.org/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; overflow-x: hidden; font-family: "SF Pro Display", -apple-system, sans-serif; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .forecast-scroll { overflow-x: auto; scrollbar-width: none; }
        .forecast-scroll::-webkit-scrollbar { display: none; }
        .text-glow { text-shadow: 0 0 20px rgba(255,255,255,0.3); }
        .lang-btn { cursor: pointer; transition: all 0.3s; }
        .lang-btn:hover { opacity: 1; border-bottom: 1px solid white; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <nav class="relative z-20 p-6 flex justify-between items-start">
        <div>
            <div id="ui-location-label" class="text-[10px] uppercase tracking-[0.3em] opacity-40 mb-1">Current Location</div>
            <p id="location" class="text-lg font-light tracking-tight">---</p>
        </div>
        <div class="flex flex-col items-end">
            <div class="flex gap-4 mb-2">
                <span id="btn-zh" class="lang-btn text-xs opacity-40" onclick="setLang('zh')">ZH</span>
                <span id="btn-en" class="lang-btn text-xs opacity-40" onclick="setLang('en')">EN</span>
            </div>
            <p id="sync-time" class="text-[10px] font-mono opacity-30 italic">SYNCING...</p>
        </div>
    </nav>

    <main class="relative z-10 flex flex-col items-center pt-10">
        <div id="condition-icon" class="text-6xl mb-4">--</div>
        <div id="temp" class="text-9xl font-thin tracking-tighter text-glow">--</div>
        <div id="condition-text" class="text-sm tracking-[0.5em] uppercase mt-4 opacity-60">Scanning...</div>
    </main>

    <section class="relative z-10 px-6 mt-12 grid grid-cols-3 gap-2">
        <div class="glass rounded-3xl p-4 text-center">
            <p id="ui-hum" class="text-[9px] opacity-30 uppercase mb-1">Humidity</p>
            <p id="val-hum" class="text-lg font-light">--</p>
        </div>
        <div class="glass rounded-3xl p-4 text-center">
            <p id="ui-wind" class="text-[9px] opacity-30 uppercase mb-1">Wind</p>
            <p id="val-wind" class="text-lg font-light">--</p>
        </div>
        <div class="glass rounded-3xl p-4 text-center">
            <p id="ui-uv" class="text-[9px] opacity-30 uppercase mb-1">UV Index</p>
            <p id="val-uv" class="text-lg font-light">--</p>
        </div>
    </section>

    <section class="relative z-10 px-6 mt-8 mb-20">
        <div id="ui-forecast-label" class="text-[10px] opacity-30 uppercase tracking-widest mb-4 ml-2">7-Day Forecast</div>
        <div id="forecast-container" class="forecast-scroll flex gap-3 pb-4">
            </div>
    </section>

    <footer class="fixed bottom-6 w-full text-center z-10 opacity-20 text-[10px] tracking-widest pointer-events-none">
        YZWEATHER ELITE SYSTEM BY FLYZ
    </footer>

    <script>
        // --- 1. 多语言配置 ---
        const I18N = {
            zh: {
                loc: "当前定位", hum: "湿度", wind: "风速", uv: "紫外线", forecast: "7日天气预报",
                weather: { 0: "晴朗", 1: "大部晴朗", 2: "多云", 3: "阴天", 45: "大雾", 51: "毛毛雨", 61: "小雨", 63: "中雨", 71: "小雪", 95: "雷阵雨" },
                sync: "同步于"
            },
            en: {
                loc: "Current Location", hum: "Humidity", wind: "Wind", uv: "UV Index", forecast: "7-Day Forecast",
                weather: { 0: "Clear Sky", 1: "Mainly Clear", 2: "Partly Cloudy", 3: "Overcast", 45: "Foggy", 51: "Drizzle", 61: "Slight Rain", 63: "Rainy", 71: "Snowy", 95: "Storm" },
                sync: "Sync at"
            }
        };

        let currentLang = localStorage.getItem('lang') || 'en';

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.add('opacity-40'));
            document.getElementById(`btn-${lang}`).classList.remove('opacity-40');
            updateUIStrings();
            updateWeather(); // 重新加载数据以刷新天气描述
        }

        function updateUIStrings() {
            const t = I18N[currentLang];
            document.getElementById('ui-location-label').innerText = t.loc;
            document.getElementById('ui-hum').innerText = t.hum;
            document.getElementById('ui-wind').innerText = t.wind;
            document.getElementById('ui-uv').innerText = t.uv;
            document.getElementById('ui-forecast-label').innerText = t.forecast;
        }

        // --- 2. 3D 渲染核心 ---
        let scene, camera, renderer, ball, light;
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const geo = new THREE.IcosahedronGeometry(2, 40);
            const mat = new THREE.MeshPhysicalMaterial({
                color: 0xffffff, roughness: 0.2, metalness: 0.5, transmission: 0.7, transparent: true
            });
            ball = new THREE.Mesh(geo, mat);
            scene.add(ball);

            light = new THREE.PointLight(0x00ffff, 10, 20);
            light.position.set(5, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040, 2));
            camera.position.z = 6;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            ball.rotation.y += 0.003;
            renderer.render(scene, camera);
        }

        function updateVisuals(code, temp) {
            let color = 0x00f3ff; // Default
            let speed = 1.0;

            if (code <= 1) color = 0xffcc00; // Sunny
            else if (code <= 3) color = 0xaaaaaa; // Cloudy
            else if (code >= 61) { color = 0x0055ff; speed = 3.0; } // Rain
            else if (code >= 71) { color = 0xffffff; speed = 0.5; } // Snow

            gsap.to(light.color, { r: new THREE.Color(color).r, g: new THREE.Color(color).g, b: new THREE.Color(color).b, duration: 2 });
            gsap.to(ball.scale, { x: 1 + temp/100, y: 1 + temp/100, z: 1 + temp/100, duration: 2 });
        }

        // --- 3. 天气逻辑 ---
        async function updateWeather() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                document.getElementById('location').innerText = `${latitude.toFixed(2)}°N, ${longitude.toFixed(2)}°E`;

                const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,uv_index&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto`;
                
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    renderWeather(data);
                } catch (e) { console.error("API Error"); }
            });
        }

        function renderWeather(data) {
            const curr = data.current;
            const t = I18N[currentLang];

            // Current Weather
            document.getElementById('temp').innerText = Math.round(curr.temperature_2m) + "°";
            document.getElementById('condition-text').innerText = t.weather[curr.weather_code] || t.weather[3];
            document.getElementById('val-hum').innerText = curr.relative_humidity_2m + "%";
            document.getElementById('val-wind').innerText = curr.wind_speed_10m + " km/h";
            document.getElementById('val-uv').innerText = curr.uv_index;
            document.getElementById('sync-time').innerText = `${t.sync} ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;

            // Visual Icon
            const icons = { 0: "☀️", 1: "🌤️", 2: "⛅", 3: "☁️", 45: "🌫️", 61: "🌧️", 71: "❄️", 95: "⛈️" };
            document.getElementById('condition-icon').innerText = icons[curr.weather_code] || "🌥️";

            updateVisuals(curr.weather_code, curr.temperature_2m);

            // Forecast
            const forecastContainer = document.getElementById('forecast-container');
            forecastContainer.innerHTML = '';
            data.daily.time.forEach((day, i) => {
                const date = new Date(day);
                const dayName = currentLang === 'zh' ? ['日','一','二','三','四','五','六'][date.getDay()] : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][date.getDay()];
                const card = document.createElement('div');
                card.className = 'glass min-w-[100px] rounded-3xl p-5 flex flex-col items-center';
                card.innerHTML = `
                    <p class="text-[10px] opacity-40 mb-3">${i === 0 ? (currentLang === 'zh' ? '今天' : 'Today') : dayName}</p>
                    <span class="text-2xl mb-3">${icons[data.daily.weather_code[i]] || "☁️"}</span>
                    <p class="text-sm font-medium">${Math.round(data.daily.temperature_2m_max[i])}°</p>
                    <p class="text-[10px] opacity-30">${Math.round(data.daily.temperature_2m_min[i])}°</p>
                `;
                forecastContainer.appendChild(card);
            });
        }

        // Init
        init3D();
        setLang(currentLang);
        setInterval(updateWeather, 300000); // 5 min refresh

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
