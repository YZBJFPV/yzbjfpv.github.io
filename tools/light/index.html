<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flyz Light</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    transition: background 0.6s ease;
  }
  /* 爆闪专用：关闭所有过渡 */
  body.no-transition {
    transition: none !important;
  }

  /* 开屏容器 - 动画完整播完再退场 */
  #splash {
    position: fixed;
    inset: 0;
    background: #000;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: system-ui, -apple-system, sans-serif;
    z-index: 9999;
    animation: splashBgFade 5s ease forwards, splashOut 0.6s ease 5s forwards;
  }
  @keyframes splashBgFade {
    0%   { background: #000; }
    90%  { background: #000; }
    100% { background: #fff; }
  }
  @keyframes splashOut {
    to {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
  }

  /* 开屏Logo总容器 - 全程绝对居中，宽度自适应内容 */
  #splashLogo {
    font-size: 14vw;
    font-weight: 900;
    position: relative;
    width: fit-content;
    animation: logoDropBounce 0.8s cubic-bezier(0.2, 0.9, 0.3, 1.2) 0.2s forwards;
    transform: translateY(-150vh);
    opacity: 0;
  }
  /* 砸下来带回弹的入场动画 */
  @keyframes logoDropBounce {
    0% {
      transform: translateY(-150vh);
      opacity: 0;
    }
    80% {
      transform: translateY(10px);
      opacity: 1;
    }
    100% {
      transform: translateY(0);
      opacity: 1;
    }
  }

  /* 初始入场的三个模块，同步滑入组成完整YZFlight */
  .logo-part {
    display: inline-block;
  }

  /* YZ模块：向下滑出屏幕，滑走后不占文档流位置 */
  .part-yz {
    animation: yzSlideDown 0.6s ease 1.2s forwards;
  }
  @keyframes yzSlideDown {
    0% {
      transform: translateY(0);
      opacity: 1;
      width: auto;
    }
    99% {
      transform: translateY(150vh);
      opacity: 0;
      width: auto;
    }
    100% {
      transform: translateY(150vh);
      opacity: 0;
      width: 0;
      overflow: hidden;
    }
  }

  /* 初始F模块：向上滑出屏幕，和YZ完全同步，滑走后不占文档流位置 */
  .part-f-init {
    animation: fSlideUp 0.6s ease 1.2s forwards;
  }
  @keyframes fSlideUp {
    0% {
      transform: translateY(0);
      opacity: 1;
      width: auto;
    }
    99% {
      transform: translateY(-150vh);
      opacity: 0;
      width: auto;
    }
    100% {
      transform: translateY(-150vh);
      opacity: 0;
      width: 0;
      overflow: hidden;
    }
  }

  /* light模块：YZ和F滑走后，自动完美居中，全程在屏幕内 */
  .part-light {
    position: relative;
  }

  /* 新Flyz模块：从屏幕最左侧外飞入，精准贴在light左边，右边缘和light左边缘严丝合缝 */
  .part-flyz {
    position: absolute;
    top: 0;
    left: -100vw; /* 初始在整个屏幕最左侧外 */
    animation: flyzSlideInStick 0.5s cubic-bezier(0.18, 0.9, 0.32, 1.2) 2.2s forwards;
  }
  @keyframes flyzSlideInStick {
    to {
      left: 0;
      transform: translateX(-100%);
    }
  }

  /* 拼接完成后的整体摇晃动画 */
  #splashLogo {
    animation: logoDropBounce 0.8s cubic-bezier(0.2, 0.9, 0.3, 1.2) 0.2s forwards,
               logoShake 0.2s ease-in-out 2.7s 3;
  }
  @keyframes logoShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* 设备信息动画 */
  #deviceInfo {
    margin-top: 4vh;
    font-size: 3.5vw;
    font-weight: 400;
    opacity: 0;
    animation: fadeIn 0.8s ease 0.6s forwards;
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* 亮度数字 */
  #brightValue {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 16vw;
    font-weight: 700;
    z-index: 10;
    pointer-events: none;
    transition: color 0.3s ease;
  }
  body.light-mode #brightValue { color: rgba(0,0,0,0.15); }
  body.dark-mode #brightValue  { color: rgba(255,255,255,0.2); }

  /* 左右亮度按钮 - 全场景可见，极淡样式 */
  .side-btn {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 14vw;
    height: 24vh;
    border: none;
    border-radius: 10px;
    z-index: 999;
    font-size: 7vw;
    font-weight: bold;
    transition: all 0.3s ease;
  }
  #minus { left: 2vw; }
  #plus  { right: 2vw; }
  body.light-mode .side-btn {
    background: rgba(0,0,0,0.08);
    color: rgba(0,0,0,0.6);
    border: 1px solid rgba(0,0,0,0.1);
  }
  body.dark-mode .side-btn {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
  }

  /* 按钮组 - 全场景可见，极淡样式，永远顶层 */
  .bar {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 999;
  }
  .top-bar    { top: 3vh; }
  .bottom-bar { bottom: 3vh; }

  .btn {
    padding: 12px 16px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    transition: all 0.3s ease;
  }
  body.light-mode .btn {
    background: rgba(0,0,0,0.08);
    color: rgba(0,0,0,0.7);
    border: 1px solid rgba(0,0,0,0.1);
  }
  body.dark-mode .btn {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .btn.active {
    background: #fff !important;
    color: #000 !important;
    border-color: #fff !important;
  }
  /* 关灯后开关按钮强制高亮细体“开”字 */
  body.dark-mode #lightBtn {
    color: #fff !important;
    font-weight: 300 !important;
    background: rgba(255,255,255,0.2) !important;
    border-color: rgba(255,255,255,0.3) !important;
  }

  /* 灯光秀 - 提速优化，无咔闪，可正常开关 */
  #lightShow {
    position: fixed;
    inset: 0;
    z-index: 1;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
    background: linear-gradient(135deg, 
      #000 0%, 
      #fff 18%, 
      #000 36%, 
      #fff 54%, 
      #000 72%, 
      #fff 90%, 
      #000 100%
    );
    background-size: 400% 400%;
    animation: smoothLightFlow 2.8s linear infinite;
  }
  @keyframes smoothLightFlow {
    0%   { background-position: 0% 0%; }
    100% { background-position: 400% 400%; }
  }
  body.light-show #lightShow {
    opacity: 1;
    pointer-events: auto;
  }

  /* 提示弹窗 */
  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 20px 30px;
    background: rgba(0,0,0,0.9);
    color: #fff;
    border-radius: 12px;
    font-size: 18px;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body class="dark-mode">

<!-- 开屏动画 - 彻底解决所有位置问题 -->
<div id="splash">
  <div id="splashLogo">
    <span class="logo-part part-yz">YZ</span>
    <span class="logo-part part-f-init">F</span>
    <span class="logo-part part-light">light</span>
    <span class="part-flyz">Flyz</span>
  </div>
  <div id="deviceInfo"></div>
</div>

<!-- 核心功能元素 -->
<div id="brightValue">100</div>
<button id="minus" class="side-btn">-</button>
<button id="plus"  class="side-btn">+</button>

<!-- 顶部爆闪按钮 -->
<div class="bar top-bar">
  <button class="btn" data-f="off">关闭</button>
  <button class="btn" data-f="low">15Hz</button>
  <button class="btn" data-f="mid">30Hz</button>
  <button class="btn" data-f="high">60Hz</button>
</div>

<!-- 底部功能按钮 -->
<div class="bar bottom-bar">
  <button class="btn" id="hdrBtn">HDR 模式</button>
  <button class="btn" id="lightBtn">开关灯</button>
  <button class="btn" id="showBtn">灯光秀</button>
</div>

<!-- 灯光秀层 -->
<div id="lightShow"></div>
<!-- 提示弹窗 -->
<div class="toast" id="toast"></div>

<script>
  // 核心元素获取
  const body = document.body;
  const deviceInfo = document.getElementById('deviceInfo');
  const brightVal = document.getElementById('brightValue');
  const lightShow = document.getElementById('lightShow');
  const toast = document.getElementById('toast');
  const minusBtn = document.getElementById('minus');
  const plusBtn = document.getElementById('plus');
  const lightBtn = document.getElementById('lightBtn');
  const showBtn = document.getElementById('showBtn');

  // 全局状态
  let brightness = 100;
  let isLightOn = true;
  let lightShowMode = false;
  let flashTimer = null;
  // 滚轮式亮度调节专用变量
  let brightRafId = null;
  let pressStartTime = 0;
  let pressDirection = 0; // -1 减，+1 加，0 停止
  const BASE_STEP = 1; // 基础步长1，线性增减
  const MAX_STEP = 10; // 最大步长，防止过快
  const ACCELERATION = 0.005; // 线性加速度，每毫秒增加的步长
  // 缓存key
  const STORAGE_KEY = 'flyz_light_config';

  // 设备能力检测
  let maxRefreshRate = 60;
  let supportHDR = false;
  try {
    // 检测屏幕刷新率
    if (matchMedia('(min-refresh-rate: 90Hz)').matches) maxRefreshRate = 90;
    if (matchMedia('(min-refresh-rate: 120Hz)').matches) maxRefreshRate = 120;
    // 最高爆闪锁定60Hz
    const maxFlashHz = 60;
    // 检测HDR
    supportHDR = matchMedia('(dynamic-range: high)').matches;
    // 开屏显示信息
    deviceInfo.innerHTML = `屏幕刷新率：${maxRefreshRate}Hz<br>最高爆闪：${maxFlashHz}Hz<br>HDR：${supportHDR ? '✅ 支持' : '❌ 不支持'}`;
  } catch (e) {
    deviceInfo.innerHTML = `最高爆闪：60Hz<br>HDR：不支持`;
  }

  // 从缓存读取上次的配置
  function loadStorageConfig() {
    try {
      const config = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (config) {
        brightness = Math.max(0, Math.min(100, config.brightness || 100));
        isLightOn = config.isLightOn ?? true;
      }
    } catch (e) {
      brightness = 100;
      isLightOn = true;
    }
  }

  // 保存配置到缓存
  function saveStorageConfig() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        brightness: brightness,
        isLightOn: isLightOn
      }));
    } catch (e) {}
  }

  // 亮度更新
  function updateBright() {
    brightVal.textContent = Math.round(brightness);
    body.style.filter = `brightness(${brightness}%)`;
    saveStorageConfig();
  }

  // 滚轮式亮度调节核心循环 - 与屏幕刷新率同步，线性加速
  function brightScrollLoop() {
    if (pressDirection === 0) return;
    // 计算按压时长，线性计算当前步长
    const pressDuration = Date.now() - pressStartTime;
    const currentStep = Math.min(MAX_STEP, BASE_STEP + pressDuration * ACCELERATION);
    // 计算本次变化量，步长永远是整数，保证1格1格线性变化
    const delta = Math.round(pressDirection * currentStep);
    // 更新亮度，限制边界
    brightness = Math.max(0, Math.min(100, brightness + delta));
    updateBright();
    // 继续循环，实现滚轮式连续滚动
    brightRafId = requestAnimationFrame(brightScrollLoop);
  }

  // 开始亮度调节
  function startBrightAdjust(dir) {
    // 防止重复触发
    if (brightRafId) cancelAnimationFrame(brightRafId);
    pressDirection = dir;
    pressStartTime = Date.now();
    // 立即执行一次，点击也能生效
    brightness = Math.max(0, Math.min(100, brightness + dir * BASE_STEP));
    updateBright();
    // 启动滚轮式循环
    brightScrollLoop();
  }

  // 停止亮度调节
  function stopBrightAdjust() {
    // 取消循环，立即停止
    if (brightRafId) {
      cancelAnimationFrame(brightRafId);
      brightRafId = null;
    }
    pressDirection = 0;
  }

  // 绑定长按事件（兼容PC+移动端，阻止默认行为防止误触）
  minusBtn.addEventListener('mousedown', () => startBrightAdjust(-1));
  minusBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    startBrightAdjust(-1);
  });
  plusBtn.addEventListener('mousedown', () => startBrightAdjust(1));
  plusBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    startBrightAdjust(1);
  });
  // 全局绑定松开/离开事件，防止意外卡住
  document.addEventListener('mouseup', stopBrightAdjust);
  document.addEventListener('touchend', stopBrightAdjust);
  document.addEventListener('mouseleave', stopBrightAdjust);
  document.addEventListener('touchcancel', stopBrightAdjust);

  // 停止所有效果
  function stopAll() {
    clearInterval(flashTimer);
    stopBrightAdjust();
    body.classList.remove('no-transition');
    document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
  }

  // 开关灯逻辑 - 记忆亮度，关灯显示“开”字
  lightBtn.onclick = () => {
    stopAll();
    isLightOn = !isLightOn;
    if (isLightOn) {
      // 开灯：恢复缓存的亮度
      lightBtn.innerText = '开关灯';
      body.style.background = '#fff';
      body.classList.remove('dark-mode');
      body.classList.add('light-mode');
    } else {
      // 关灯：保存当前亮度到缓存，显示“开”字
      lightBtn.innerText = '开';
      body.style.background = '#000';
      body.classList.remove('light-mode');
      body.classList.add('dark-mode');
    }
    updateBright();
    saveStorageConfig();
  };

  // 灯光秀逻辑
  showBtn.onclick = () => {
    stopAll();
    lightShowMode = !lightShowMode;
    if (lightShowMode) {
      // 开启灯光秀
      body.classList.add('light-show');
      body.style.background = '#000';
      body.classList.remove('light-mode');
      body.classList.add('dark-mode');
    } else {
      // 关闭灯光秀，恢复开灯状态
      body.classList.remove('light-show');
      isLightOn = true;
      lightBtn.innerText = '开关灯';
      body.style.background = '#fff';
      body.classList.remove('dark-mode');
      body.classList.add('light-mode');
      brightness = 100;
    }
    updateBright();
    saveStorageConfig();
  };

  // HDR按钮逻辑
  hdrBtn.onclick = () => {
    showToast(supportHDR ? 'HDR 已开启' : '设备不支持 HDR');
  };

  // 爆闪逻辑 - 无过渡硬切换
  document.querySelectorAll('[data-f]').forEach(btn => {
    btn.onclick = () => {
      if (lightShowMode) {
        showToast('灯光秀中禁止操作');
        return;
      }
      stopAll();
      const mode = btn.dataset.f;
      if (mode === 'off') {
        // 关闭爆闪，恢复之前的开关状态
        isLightOn = true;
        lightBtn.innerText = '开关灯';
        body.style.background = '#fff';
        body.classList.remove('dark-mode');
        body.classList.add('light-mode');
        updateBright();
        saveStorageConfig();
        return;
      }
      // 开启爆闪：关闭过渡，硬切换
      btn.classList.add('active');
      body.classList.add('no-transition');
      const msMap = {
        low: 1000 / 15,
        mid: 1000 / 30,
        high: 1000 / 60
      };
      const interval = msMap[mode] || 1000 / 60;
      let isFlashOn = true;
      flashTimer = setInterval(() => {
        body.style.background = isFlashOn ? '#000' : '#fff';
        body.classList.toggle('dark-mode', isFlashOn);
        body.classList.toggle('light-mode', !isFlashOn);
        isFlashOn = !isFlashOn;
      }, interval);
    };
  });

  // 提示弹窗
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  }

  // 页面初始化：加载缓存配置
  loadStorageConfig();
  // 开屏结束后初始化页面状态
  setTimeout(() => {
    if (isLightOn) {
      body.style.background = '#fff';
      body.classList.remove('dark-mode');
      body.classList.add('light-mode');
      lightBtn.innerText = '开关灯';
    } else {
      body.style.background = '#000';
      body.classList.remove('light-mode');
      body.classList.add('dark-mode');
      lightBtn.innerText = '开';
    }
    updateBright();
  }, 5600);
</script>
</body>
</html>
