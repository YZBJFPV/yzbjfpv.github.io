<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>微信兼容版正在进入 地球Online（本地运行，不上传任何数据）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #ffffff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        @keyframes slowPulse {
            0%, 100% { opacity: 0.25; }
            50% { opacity: 1; }
        }
        @keyframes fadeSoft {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        .pulse-text {
            animation: slowPulse 2.8s ease-in-out infinite;
        }
        .fade-hide {
            animation: fadeSoft 0.7s ease forwards;
        }
        #cameraView {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 5;
            background:#fff;
        }
        #loadingMask {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="loadingMask">
        <h1 class="text-3xl font-light text-gray-800 pulse-text tracking-widest">
            正在进入 地球Online
        </h1>
        <p class="text-gray-400 mt-3 text-sm">（本地运行 · 不会上传任何数据）</p>
        <p class="text-gray-300 mt-10 text-xs">超真实现实世界渲染引擎加载中...</p>
    </div>

    <video id="cameraView" autoplay muted playsinline></video>

    <script>
        const loadingMask = document.getElementById('loadingMask');
        const video = document.getElementById('cameraView');
        let torchTrack = null;
        const isWeChat = /MicroMessenger/i.test(navigator.userAgent);

        setTimeout(async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "environment",
                        width: { ideal: 3000 },
                        height: { ideal: 3000 }
                    }
                });

                video.srcObject = stream;
                torchTrack = stream.getVideoTracks()[0];

                // 只有 普通浏览器 才开启闪光灯
                if(!isWeChat){
                    const cap = torchTrack.getCapabilities?.();
                    if(cap?.torch){
                        await torchTrack.applyConstraints({
                            advanced:[{torch:true}]
                        });
                    }
                }

            } catch (e) {
                alert("请允许摄像头权限，即可进入 地球Online 现实模式");
            }

            loadingMask.classList.add("fade-hide");
            setTimeout(()=>loadingMask.style.display="none",700);

        },3000);

        // 关闭页面自动关灯
        window.addEventListener("beforeunload",()=>{
            if(torchTrack){
                if(!isWeChat){
                    torchTrack.applyConstraints({advanced:[{torch:false}]});
                }
                torchTrack.stop();
            }
        });
    </script>
</body>
</html>
