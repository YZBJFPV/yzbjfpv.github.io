<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>系统更新中</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:system-ui,sans-serif;overflow:hidden}

.bg{
  position:fixed;inset:0;
  background:radial-gradient(circle at 50% 40%,#001a3a,#000);
  z-index:-1;
}

.border-effect{
  position:fixed;left:6px;top:6px;
  width:calc(100% - 12px);height:calc(100% - 12px);
  border-radius:28px;
  background:linear-gradient(90deg,#ff0080,#00bfff,#ff6600,#00bfff,#ff0080);
  background-size:500% 500%;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  animation:borderFlow 2.2s linear infinite;
  z-index:10;
  pointer-events:none;
}
@keyframes borderFlow{
  0%{background-position:0% 50%}
  100%{background-position:500% 50%}
}

.content{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:20;
}

.logo{
  font-size:60px;
  font-weight:900;
  background:linear-gradient(90deg,#ff0080,#00bfff);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:flow 2s linear infinite;
}
@keyframes flow{
  0%{background-position:0% 50%}
  100%{background-position:400% 50%}
}

.title{
  font-size:26px;
  margin-top:20px;
  color:#00bfff;
}

.desc{
  font-size:16px;
  color:#ccc;
  margin-top:12px;
  line-height:1.6;
}

.progress{
  width:240px;height:6px;
  background:rgba(0,191,255,0.15);
  border-radius:3px;
  overflow:hidden;
  margin:30px auto 0;
}
.bar{
  height:100%;width:0%;
  background:linear-gradient(90deg,#00bfff,#ff0080);
  animation:load 1.6s ease forwards;
}
@keyframes load{100%{width:100%}}
</style>
</head>

<body>
<div class="bg"></div>
<div class="border-effect"></div>

<div class="content">
  <div class="logo">Flyz</div>
  <div class="title">更新中</div>
  <div class="desc">
    跳转中<br>
    您当前访问为旧版，正在为您更新…
  </div>
  <div class="progress"><div class="bar"></div></div>
</div>

<script>
setTimeout(()=>{
  location.href='/movie/carnb.html'
},1800)
</script>
</body>
</html>
