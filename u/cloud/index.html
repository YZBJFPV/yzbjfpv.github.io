<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YZCloud</title>
    <style>
        :root {
            --bg-dark: #050505;
            --text-main: #ededed;
            --text-muted: #888888;
            --accent-glow: rgba(45, 120, 255, 0.4);
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(20, 20, 20, 0.5);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        body, html {
            width: 100%;
            height: 100dvh;
            min-height: 100dvh;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        .ambient-light {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vw;
            max-width: 800px;
            max-height: 800px;
            background: radial-gradient(circle, var(--accent-glow) 0%, rgba(0,0,0,0) 70%);
            filter: blur(80px);
            opacity: 0.5;
            z-index: 0;
            pointer-events: none;
        }
        .page-container {
            position: relative;
            width: 100%;
            height: 100dvh;
            z-index: 10;
        }
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease-in-out, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            transform: scale(0.98);
            padding: 16px;
        }
        .page.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }
        #click-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 100;
            cursor: pointer;
        }
        .glass-panel {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 45px 35px 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center;
            max-width: 900px;
            width: 100%;
            max-height: 85dvh;
            overflow-y: auto;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            position: relative;
            z-index: 10;
        }
        .main-title {
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(180deg, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
        }
        .resource-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
        }
        .tag-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.9rem;
            color: #d0d0d0;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 35px;
        }
        .info-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            text-align: left;
        }
        .info-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .info-value {
            font-size: 1.05rem;
            font-weight: 500;
            color: #fff;
            line-height: 1.5;
        }
        .info-value.highlight {
            color: #ffd700;
            font-weight: 600;
            text-shadow: 0 0 12px rgba(255, 215, 0, 0.5);
        }
        .footer-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .click-hint {
            margin-top: 20px;
            font-size: 1.05rem;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
            animation: breathe 1.5s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes breathe {
            0% { opacity: 0.3; transform: scale(0.98) translateY(2px); }
            100% { opacity: 1; transform: scale(1.02) translateY(-2px); }
        }
        #propulsion-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100dvh;
            z-index: 1;
        }
        .loading-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 24px;
        }
        #loading-text-container {
            width: 100%;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .loading-text {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: 1px;
            width: 100%;
            text-align: center;
            position: absolute;
            background: linear-gradient(90deg, #ffd700, #ff6b9d, #c084fc, #22d3ee, #ffd700);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientFlow 2s linear infinite;
            filter: drop-shadow(0 0 15px rgba(192, 132, 252, 0.6));
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        .loading-text.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .loading-text.exit {
            opacity: 0;
            transform: translateY(-40px);
        }
        .route-container {
            width: 100%;
            max-width: 600px;
            max-height: 85dvh;
            z-index: 10;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .route-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-shrink: 0;
        }
        .route-title {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .user-pill {
            background: rgba(255,255,255,0.1);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #fff;
            flex-shrink: 0;
        }
        .route-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .route-card {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            cursor: pointer;
        }
        .route-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        .route-card.premium {
            background: linear-gradient(90deg, rgba(255,215,0,0.02) 0%, rgba(192,132,252,0.06) 50%, rgba(34,211,238,0.02) 100%);
            border-color: rgba(192, 132, 252, 0.25);
            box-shadow: inset 0 0 30px rgba(192, 132, 252, 0.05);
        }
        .route-card.premium:hover {
            border-color: rgba(34, 211, 238, 0.6);
            box-shadow: inset 0 0 40px rgba(34, 211, 238, 0.1), 0 12px 35px rgba(192, 132, 252, 0.2);
        }
        .route-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .route-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.5px;
            transition: color 0.3s;
        }
        .route-card:hover .route-name {
            color: #22d3ee;
        }
        .route-speed-badge {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            gap: 12px;
            margin-top: 2px;
        }
        .speed-item strong {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
        }
        .route-card.premium .route-name {
            background: linear-gradient(90deg, #ffffff, #e0b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .route-card.premium:hover .route-name {
            background: linear-gradient(90deg, #22d3ee, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .route-card.premium .speed-item strong {
            color: #22d3ee;
            text-shadow: 0 0 8px rgba(34, 211, 238, 0.3);
        }
        .route-card.premium .speed-item.upload-speed strong {
            color: #ffd700;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
        }
        .go-arrow {
            color: rgba(255,255,255,0.25);
            font-size: 1.3rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            flex-shrink: 0;
        }
        .route-card:hover .go-arrow {
            color: #22d3ee;
            transform: translateX(4px);
        }

        @media (max-width: 768px) {
            .glass-panel { 
                padding: 24px 16px 18px; 
                border-radius: 18px;
                max-height: 90dvh;
            }
            .main-title { 
                font-size: 1.6rem;
                margin-bottom: 14px;
            }
            .resource-tags { 
                gap: 6px; 
                margin-bottom: 20px; 
            }
            .tag-pill { 
                padding: 4px 10px; 
                font-size: 0.75rem; 
            }
            .info-grid { 
                grid-template-columns: 1fr;
                gap: 8px; 
                margin-bottom: 20px; 
            }
            .info-card { 
                padding: 10px 14px; 
            }
            .info-label { 
                margin-bottom: 4px; 
                font-size: 0.75rem;
            }
            .info-value { 
                font-size: 0.9rem; 
                line-height: 1.4;
            }
            .footer-desc { 
                font-size: 0.75rem; 
                padding-bottom: 12px; 
            }
            .click-hint { 
                font-size: 0.9rem; 
                margin-top: 12px;
                letter-spacing: 2px;
            }
            
            .loading-text { 
                font-size: 1.25rem; 
            }
            
            .route-header {
                margin-bottom: 20px;
            }
            .route-title {
                font-size: 1.5rem;
            }
            .route-card { 
                padding: 16px 20px; 
                border-radius: 14px;
            }
            .route-name { 
                font-size: 1.05rem; 
            }
            .route-speed-badge { 
                font-size: 0.8rem; 
                gap: 10px; 
            }
            .go-arrow {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 360px) {
            .main-title { font-size: 1.4rem; }
            .route-name { font-size: 0.95rem; }
            .route-speed-badge { font-size: 0.75rem; }
            .loading-text { font-size: 1.1rem; }
            .user-pill { font-size: 0.75rem; padding: 5px 12px; }
        }
    </style>
</head>
<body>
    <div class="ambient-light"></div>
    <div class="page-container">
        
        <section class="page active" id="page-cover">
            <div id="click-overlay" onclick="startLoading()"></div>
            <div class="glass-panel">
                <h1 class="main-title">YZCloud云资源共享平台</h1>
                <div class="resource-tags">
                    <span class="tag-pill">3D打印</span>
                    <span class="tag-pill">航模图纸</span>
                    <span class="tag-pill">飞行模拟</span>
                    <span class="tag-pill">接线图</span>
                    <span class="tag-pill">常用软件</span>
                    <span class="tag-pill">一站式下载</span>
                </div>
                <div class="info-grid">
                    <div class="info-card">
                        <div class="info-label">共享凭证</div>
                        <div class="info-value highlight">账号：A1<br>密码：1234</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">特别致谢</div>
                        <div class="info-value">感谢 @远程超超<br>大力支持</div>
                    </div>
                </div>
                <div class="footer-desc">
                    支持模友上传 · 欢迎共享资源 · 上传不限大小
                </div>
                <div class="click-hint">点击任意位置进入</div>
            </div>
        </section>

        <section class="page" id="page-loading">
            <canvas id="propulsion-canvas"></canvas>
            <div class="loading-content">
                <div id="loading-text-container"></div>
            </div>
        </section>

        <section class="page" id="page-routes">
            <div class="route-container">
                <div class="route-header">
                    <h2 class="route-title">节点选择</h2>
                    <div class="user-pill">用户名：Flyz</div>
                </div>
                <div class="route-list">
                    <a href="http://123.56.106.49:12345" target="_blank" class="route-card">
                        <div class="route-details">
                            <div class="route-name">旧低速线路 A 节点</div>
                            <div class="route-speed-badge">
                                <span class="speed-item">上传: <strong>8MB/s</strong></span>
                                <span class="speed-item">下载: <strong>2MB/s</strong></span>
                            </div>
                        </div>
                        <div class="go-arrow">→</div>
                    </a>
                    <a href="http://123.56.106.49:54321" target="_blank" class="route-card">
                        <div class="route-details">
                            <div class="route-name">旧低速线路 B 节点</div>
                            <div class="route-speed-badge">
                                <span class="speed-item">上传: <strong>8MB/s</strong></span>
                                <span class="speed-item">下载: <strong>2MB/s</strong></span>
                            </div>
                        </div>
                        <div class="go-arrow">→</div>
                    </a>
                    <a href="http://123.56.106.49:1111" target="_blank" class="route-card premium">
                        <div class="route-details">
                            <div class="route-name">2026暑假特供超高速线路 (推荐)</div>
                            <div class="route-speed-badge">
                                <span class="speed-item upload-speed">上传: <strong>95MB/s Max</strong></span>
                                <span class="speed-item">下载: <strong>10MB/s Max</strong></span>
                            </div>
                        </div>
                        <div class="go-arrow">→</div>
                    </a>
                </div>
            </div>
        </section>
    </div>

    <script>
        function startLoading() {
            document.getElementById('page-cover').classList.remove('active');
            document.getElementById('page-loading').classList.add('active');
            initPropulsion();
            runLoadingSequence();
        }

        const singleTexts = [
            "正在连接YZCloudFnos服务器",
            "正在连接YZCloudWin7服务器",
            "正在连接52Frp中转服务器",
            "正在连接FlyzSafe加密连接",
            "正在连接yzbjfpv.top",
            "正在连接917813.com.cn"
        ];

        function runLoadingSequence() {
            const container = document.getElementById('loading-text-container');
            let currentIndex = 0;
            const showTime = 420; 
            const exitTime = 160;

            function showNextSingle() {
                if (currentIndex >= singleTexts.length) {
                    document.getElementById('page-loading').classList.remove('active');
                    document.getElementById('page-routes').classList.add('active');
                    stopPropulsion();
                    return;
                }

                container.innerHTML = '';
                const el = document.createElement('div');
                el.className = 'loading-text';
                el.innerText = singleTexts[currentIndex];
                container.appendChild(el);

                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        el.classList.add('visible');
                    });
                });

                setTimeout(() => {
                    el.classList.remove('visible');
                    el.classList.add('exit');
                    setTimeout(() => {
                        currentIndex++;
                        targetSpeed += 3.5; 
                        showNextSingle();
                    }, exitTime);
                }, showTime);
            }

            setTimeout(showNextSingle, 200);
        }

        const canvas = document.getElementById('propulsion-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId;
        let currentSpeed = 0.8;
        let targetSpeed = 0.8;
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = (Math.random() - 0.5) * canvas.width * 2;
                this.y = (Math.random() - 0.5) * canvas.height * 2;
                this.z = Math.random() * canvas.width;
                this.pastZ = this.z;
            }
            update(speed) {
                this.pastZ = this.z;
                this.z -= speed;
                if (this.z <= 0) this.reset();
            }
            draw() {
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                const x1 = (this.x / this.z) * cx + cx;
                const y1 = (this.y / this.z) * cy + cy;
                const x2 = (this.x / this.pastZ) * cx + cx;
                const y2 = (this.y / this.pastZ) * cy + cy;
                ctx.beginPath();
                ctx.moveTo(x2, y2);
                ctx.lineTo(x1, y1);
                const distanceFactor = (1 - this.z / canvas.width);
                ctx.lineWidth = distanceFactor * 3;
                ctx.strokeStyle = `rgba(200, 230, 255, ${distanceFactor})`;
                ctx.stroke();
            }
        }
        function initPropulsion() {
            particles = [];
            for (let i = 0; i < 450; i++) particles.push(new Particle());
            animatePropulsion();
        }
        function animatePropulsion() {
            currentSpeed += (targetSpeed - currentSpeed) * 0.06;
            ctx.fillStyle = 'rgba(5, 5, 5, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update(currentSpeed * 7);
                p.draw();
            });
            animationId = requestAnimationFrame(animatePropulsion);
        }
        function stopPropulsion() { cancelAnimationFrame(animationId); }
    </script>
</body>
</html>
